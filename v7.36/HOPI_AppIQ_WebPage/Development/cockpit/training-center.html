<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Training Center — MNG Cockpit · HOPI AppIQ</title>
  <link rel="stylesheet" href="_cockpit.css"/>
  <style>

    /* ── CSS variable alias — _cockpit.css uses --c-muted, not --c-text-muted ── */
    :root { --c-text-muted: var(--c-muted); }

    /* ── Training Center — full-viewport slide layout ── */
    /* Body becomes flex column so tc-main fills remaining height
       regardless of actual shell height (topbar + hero + mottos ≈ 134px) */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #cockpit-shell { flex-shrink: 0; }

    .tc-main {
      flex: 1;
      min-height: 0;        /* required for flex children to shrink */
      display: flex;
      flex-direction: column;
      padding: 0 !important;
      max-width: none !important;
      overflow: hidden;
    }

    /* ── Stage ─────────────────────────────────────────────────────────── */
    .tc-stage {
      flex: 1;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      position: relative;
    }

    .tc-slide {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 48px 16px;
      overflow-y: auto;
      animation: tcFadeIn .25s ease;
    }
    @keyframes tcFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Chapter badge ──────────────────────────────────────────────────── */
    .tc-chapter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .tc-chapter-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--c-font-sans);
    }
    .tc-chapter-badge.foundation { background: rgba(168,85,247,.18); color: #A855F7; }
    .tc-chapter-badge.practice   { background: rgba(59,130,246,.18);  color: #3B82F6; }
    .tc-chapter-badge.expert     { background: rgba(245,158,11,.18);  color: #F59E0B; }
    .tc-chapter-badge.domain     { background: rgba(16,185,129,.18);  color: #10B981; }
    .tc-chapter-badge.intro      { background: rgba(255,255,255,.08); color: var(--c-text-muted); }

    .tc-slide-id {
      font-size: 11px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      font-weight: 600;
      letter-spacing: .5px;
    }

    /* ── Slide title ────────────────────────────────────────────────────── */
    .tc-title {
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 700;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      line-height: 1.2;
      margin: 6px 0 4px;
    }
    .tc-title .accent { color: var(--c-violet); }

    .tc-subtitle {
      font-size: 15px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      margin-bottom: 20px;
    }

    /* ── Content blocks ─────────────────────────────────────────────────── */
    .tc-body { flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .tc-cols { display: grid; gap: 16px; }
    .tc-cols-2 { grid-template-columns: 1fr 1fr; }
    .tc-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .tc-cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    .tc-card {
      background: var(--c-bg2);
      border: 1px solid var(--c-border);
      border-radius: var(--c-radius);
      padding: 16px 18px;
    }
    .tc-card.highlight { border-color: var(--c-violet); background: rgba(168,85,247,.07); }
    .tc-card.green     { border-color: #10B981; background: rgba(16,185,129,.07); }
    .tc-card.amber     { border-color: #F59E0B; background: rgba(245,158,11,.07); }
    .tc-card.blue      { border-color: #3B82F6; background: rgba(59,130,246,.07); }
    .tc-card.muted     { opacity: .55; }

    .tc-card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 6px;
      font-family: var(--c-font-sans);
    }
    .tc-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      margin-bottom: 6px;
    }
    .tc-card-text {
      font-size: 13px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      line-height: 1.5;
    }
    .tc-card-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 8px;
      font-family: var(--c-font-sans);
    }
    .tag-done    { background: rgba(16,185,129,.2); color: #10B981; }
    .tag-dev     { background: rgba(168,85,247,.2); color: #A855F7; }
    .tag-soon    { background: rgba(255,255,255,.08); color: var(--c-text-muted); }
    .tag-best    { background: rgba(16,185,129,.2); color: #10B981; }
    .tag-risk    { background: rgba(239,68,68,.2); color: #EF4444; }
    .tag-default { background: rgba(245,158,11,.2); color: #F59E0B; }

    .tc-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 7px; }
    .tc-list li {
      display: flex;
      gap: 10px;
      font-size: 14px;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      line-height: 1.4;
    }
    .tc-list li::before { content: '→'; color: var(--c-violet); flex-shrink: 0; font-weight: 700; }
    .tc-list li.muted::before { color: var(--c-text-muted); }
    .tc-list li.muted { color: var(--c-text-muted); }

    .tc-insight {
      background: rgba(168,85,247,.1);
      border-left: 3px solid var(--c-violet);
      border-radius: 0 var(--c-radius-sm) var(--c-radius-sm) 0;
      padding: 12px 16px;
      font-size: 14px;
      font-style: italic;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      line-height: 1.5;
    }
    .tc-insight.green  { background: rgba(16,185,129,.1);  border-color: #10B981; }
    .tc-insight.amber  { background: rgba(245,158,11,.1);  border-color: #F59E0B; }
    .tc-insight.blue   { background: rgba(59,130,246,.1);  border-color: #3B82F6; }

    .tc-big-number {
      font-size: 42px;
      font-weight: 800;
      color: var(--c-violet);
      font-family: var(--c-font-sans);
      line-height: 1;
    }
    .tc-big-label {
      font-size: 12px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      margin-top: 4px;
    }

    /* Stack layer item */
    .tc-layer {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      border-radius: var(--c-radius-sm);
      background: var(--c-bg2);
      border: 1px solid var(--c-border);
    }
    .tc-layer.our   { border-color: var(--c-violet); background: rgba(168,85,247,.09); }
    .tc-layer-num   { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; font-family: var(--c-font-sans); }
    .tc-layer-name  { font-size: 14px; font-weight: 700; color: var(--c-text); font-family: var(--c-font-sans); min-width: 140px; }
    .tc-layer-exa   { font-size: 12px; color: var(--c-text-muted); font-family: var(--c-font-sans); }

    /* Placeholder slide */
    .tc-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      opacity: .7;
    }
    .tc-ph-icon { font-size: 40px; }
    .tc-ph-title { font-size: 20px; font-weight: 700; color: var(--c-text); font-family: var(--c-font-sans); }
    .tc-ph-desc  { font-size: 14px; color: var(--c-text-muted); font-family: var(--c-font-sans); max-width: 360px; line-height: 1.5; }
    .tc-ph-tag   { font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 4px 14px; border-radius: 20px; font-family: var(--c-font-sans); }

    /* ── Bottom navigation ──────────────────────────────────────────────── */
    .tc-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 48px 14px;
      border-top: 1px solid var(--c-border);
      gap: 16px;
      background: var(--c-bg);
      flex-shrink: 0;
    }

    .tc-nav-btn {
      background: var(--c-bg2);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      border-radius: var(--c-radius-sm);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      font-family: var(--c-font-sans);
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    .tc-nav-btn:hover:not(:disabled) { background: var(--c-violet); border-color: var(--c-violet); color: #fff; }
    .tc-nav-btn:disabled { opacity: .3; cursor: default; }

    .tc-dots {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      flex: 1;
    }
    .tc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c-border);
      cursor: pointer;
      transition: background .2s, transform .2s;
      flex-shrink: 0;
    }
    .tc-dot.active { background: var(--c-violet); transform: scale(1.35); }
    .tc-dot.foundation { --dot-c: #A855F7; }
    .tc-dot.practice   { --dot-c: #3B82F6; }
    .tc-dot.expert     { --dot-c: #F59E0B; }
    .tc-dot.domain     { --dot-c: #10B981; }
    .tc-dot.active { background: var(--dot-c, var(--c-violet)); }

    .tc-counter {
      font-size: 12px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      font-weight: 600;
      min-width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    .tc-fullscreen-btn {
      background: transparent;
      border: 1px solid var(--c-border);
      color: var(--c-text-muted);
      border-radius: var(--c-radius-sm);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .tc-fullscreen-btn:hover { border-color: var(--c-violet); color: var(--c-violet); }

    /* ── Speaker Notes panel ────────────────────────────────────────────── */
    .tc-notes-panel {
      display: none;
      background: rgba(168,85,247,.06);
      border-top: 1px solid rgba(168,85,247,.22);
      padding: 8px 48px;
      flex-shrink: 0;
      max-height: 72px;
      overflow-y: auto;
    }
    .tc-notes-panel.tc-notes-visible { display: block; }
    .tc-notes-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-wrap: wrap; gap: 4px 28px;
    }
    .tc-notes-item {
      font-size: 12px; color: var(--c-text); font-family: var(--c-font-sans);
      line-height: 1.4; display: flex; gap: 6px; align-items: baseline;
    }
    .tc-notes-item::before { content: '▶'; color: var(--c-violet); font-size: 9px; flex-shrink: 0; }
    .tc-notes-btn {
      background: transparent;
      border: 1px solid var(--c-border);
      color: var(--c-text-muted);
      border-radius: var(--c-radius-sm);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: var(--c-font-sans); letter-spacing: .5px;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .tc-notes-btn:hover    { border-color: var(--c-violet); color: var(--c-violet); }
    .tc-notes-btn.active   { border-color: var(--c-violet); color: var(--c-violet); background: rgba(168,85,247,.1); }
    .tc-notes-tabs { display:flex; gap:0; padding-bottom:4px; border-bottom:1px solid rgba(168,85,247,.18); margin-bottom:6px; flex-shrink:0; }
    .tc-notes-tab  { background:transparent; border:none; border-bottom:2px solid transparent; padding:2px 12px 5px; font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--c-text-muted); font-family:var(--c-font-sans); cursor:pointer; transition:color .15s,border-color .15s; margin-bottom:-1px; }
    .tc-notes-tab.active { color:var(--c-violet); border-bottom-color:var(--c-violet); }
    .tc-notes-tab:hover   { color:var(--c-violet); }
    .tc-notes-script { font-size:13px; color:var(--c-text); font-family:var(--c-font-sans); line-height:1.6; overflow-y:auto; }
    .tc-notes-script p { margin:0 0 4px 0; }
    .tc-sc-story { color:#10B981; font-style:italic; }
    .tc-sc-q     { color:var(--c-violet); font-style:italic; }
    .tc-notes-hidden  { display:none !important; }
    .tc-notes-panel.script-mode { max-height:190px; }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .tc-slide   { padding: 18px 20px 12px; }
      .tc-nav     { padding: 8px 20px 10px; }
      .tc-cols-2, .tc-cols-3, .tc-cols-4 { grid-template-columns: 1fr; }
      .tc-title   { font-size: 20px; }
      .tc-notes-panel { padding: 6px 20px; }
      .tc-notes-btn   { display: none; }
    }
  </style>
</head>
<body>

  <div id="cockpit-shell"></div>

  <main class="cockpit-page tc-main">

    <div class="tc-stage">
      <div class="tc-slide" id="tc-slide"><!-- JS injected --></div>
    </div>

    <div class="tc-notes-panel" id="tc-notes">
      <div class="tc-notes-tabs">

      <ul class="tc-notes-list" id="tc-notes-list"></ul>
      <div class="tc-notes-script" id="tc-notes-script"></div>

    <nav class="tc-nav">
      <button class="tc-nav-btn" id="tc-prev" title="Předchozí (←)">‹</button>
      <div class="tc-dots" id="tc-dots"></div>

      <button class="tc-nav-btn" id="tc-next" title="Další (→)">›</button>
    </nav>

  </main>

  <script src="_shell.js"></script>

  /* ─────────────────────────────────────────────────────────────────────
     SLIDE ENGINE
  ───────────────────────────────────────────────────────────────────── */
  let cur = 0;
  let notesVisible = false;
  let notesTab = 'bullets';

  function switchNotesTab(tab) {
    notesTab = tab;
    document.getElementById('tc-tab-bullets').classList.toggle('active', tab === 'bullets');
    document.getElementById('tc-tab-script').classList.toggle('active', tab === 'script');
    document.getElementById('tc-notes-list').classList.toggle('tc-notes-hidden', tab === 'script');
    document.getElementById('tc-notes-script').classList.toggle('tc-notes-hidden', tab === 'bullets');
    document.getElementById('tc-notes').classList.toggle('script-mode', tab === 'script');
  }

  function toggleNotes() {
    notesVisible = !notesVisible;
    document.getElementById('tc-notes').classList.toggle('tc-notes-visible', notesVisible);
    document.getElementById('tc-notes-btn').classList.toggle('active', notesVisible);
  }

  function renderSlide() {
    const s   = SLIDES[cur];
    const el  = document.getElementById('tc-slide');
    const lang = document.documentElement.lang || 'cs';

    let innerHtml = '';

    // Chapter + ID row
    innerHtml += `<div class="tc-chapter-row">
      <span class="tc-chapter-badge ${s.chapter}">${s.chapterLabel}</span>
      <span class="tc-slide-id">${s.id}</span>
    </div>`;

    // Title + subtitle
    innerHtml += `<div class="tc-title">${s.title}</div>`;
    if (s.subtitle) innerHtml += `<div class="tc-subtitle">${s.subtitle}</div>`;

    // Content
    if (s.placeholder) {
      innerHtml += `<div class="tc-placeholder">
        <div class="tc-ph-icon">${s.phIcon}</div>
        <div class="tc-ph-title">${s.id} — ${s.phDesc ? '' : s.title.replace(/<[^>]+>/g,'')}</div>
        <div class="tc-ph-desc">${s.phDesc || ''}</div>
        <span class="tc-ph-tag ${s.phTagClass}" style="background:rgba(168,85,247,.15);color:var(--c-violet)">${s.phTag}</span>
      </div>`;
    } else {
      innerHtml += s.html || '';
    }

    el.innerHTML = innerHtml;
    el.scrollTop = 0;

    // Notes panel
    const notesList = document.getElementById('tc-notes-list');
    if (notesList) {
      const items = NOTES[s.id] || [];
      notesList.innerHTML = items.map(n => `<li class="tc-notes-item">${n}</li>`).join('');
    }
    // Populate script (2nd layer)
    const scriptEl = document.getElementById('tc-notes-script');
    if (scriptEl) {
      const lines = SCRIPT[s.id] || [];
      scriptEl.innerHTML = lines.map(line => {
        const isStory = line.startsWith('🗣');
        const isQ    = line.startsWith('❓');
        const cls    = isStory ? 'tc-sc-story' : isQ ? 'tc-sc-q' : '';
        return `<p class="${cls}">${line}</p>`;
      }).join('');
    }

    // Dots
    document.querySelectorAll('.tc-dot').forEach((d, i) => {
      d.classList.toggle('active', i === cur);
    });

    // Buttons
    document.getElementById('tc-prev').disabled = cur === 0;
    document.getElementById('tc-next').disabled = cur === SLIDES.length - 1;

    // Counter
    document.getElementById('tc-counter').textContent = `${cur + 1} / ${SLIDES.length}`;
  }

  function buildDots() {
    const wrap = document.getElementById('tc-dots');
    wrap.innerHTML = '';
    SLIDES.forEach((s, i) => {
      const d = document.createElement('div');
      d.className = `tc-dot ${s.chapter}`;
      d.title = `${s.id}`;
      d.addEventListener('click', () => { cur = i; renderSlide(); });
      wrap.appendChild(d);
    });
  }

  function goTo(i) {
    if (i < 0 || i >= SLIDES.length) return;
    cur = i;
    renderSlide();
  }

  // Nav buttons
  document.getElementById('tc-prev').addEventListener('click', () => goTo(cur - 1));
  document.getElementById('tc-next').addEventListener('click', () => goTo(cur + 1));

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(cur + 1); }
    if (e.key === 'ArrowLeft')                   { e.preventDefault(); goTo(cur - 1); }
    if (e.key === 'f' || e.key === 'F')          { toggleFullscreen(); }
    if (e.key === 'n' || e.key === 'N')          { toggleNotes(); }
  });

  // Notes button
  document.getElementById('tc-notes-btn').addEventListener('click', toggleNotes);

  // Notes tab switchers
  document.getElementById('tc-tab-bullets').addEventListener('click', () => switchNotesTab('bullets'));
  document.getElementById('tc-tab-script').addEventListener('click',  () => switchNotesTab('script'));

  // Fullscreen
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }
  document.getElementById('tc-fs').addEventListener('click', toggleFullscreen);

  // Touch/swipe
  let _tx = null;
  document.getElementById('tc-stage').addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
  document.getElementById('tc-stage').addEventListener('touchend',   e => {
    if (_tx === null) return;
    const dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 40) goTo(cur + (dx < 0 ? 1 : -1));
    _tx = null;
  });

  // Lang change (shell event)
  document.addEventListener('appiq:langchange', renderSlide);

  // Init
  buildDots();
  renderSlide();

  </script>
</body>
</html>
