<html lang="cs" translate="no">

<title>HOPI AppIQ — Documentation Center (FC-7)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── NAV ── */
.dc-nav{background:#161b22;border-bottom:2px solid #26c6da;padding:0 20px;height:48px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.dc-nav-back{color:#26c6da;font-size:12px;font-weight:700;text-decoration:none;border:1px solid rgba(38,198,218,.4);border-radius:5px;padding:4px 12px;transition:all .2s;white-space:nowrap;}
.dc-nav-back:hover{background:rgba(38,198,218,.15);border-color:#26c6da;}
.dc-nav-brand{font-size:13px;font-weight:700;color:#e6edf3;}
.dc-nav-version{font-size:11px;color:#484f58;font-family:Consolas,monospace;margin-left:2px;}
.dc-nav-badge{font-size:10px;background:rgba(38,198,218,.12);color:#26c6da;border:1px solid rgba(38,198,218,.3);border-radius:10px;padding:2px 9px;font-weight:700;white-space:nowrap;}

/* ── TABS ── */
.dc-tabs{display:flex;gap:0;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;}
.dc-tab{padding:9px 22px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:#8b949e;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Segoe UI',Arial,sans-serif;transition:all .15s;white-space:nowrap;}
.dc-tab.active{color:#26c6da;border-bottom-color:#26c6da;}
.dc-tab:hover:not(.active){color:#e6edf3;background:#21262d;}

/* ── BODY / PANES ── */
.dc-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.dc-pane{flex:1;overflow-y:auto;display:none;padding:16px 20px;background:#0d1117;}
.dc-pane.active{display:block;}

/* ── LANG SWITCH ── */
.lang-switch{display:flex;gap:4px;align-items:center;margin-left:auto;}
.lang-btn{background:transparent;border:1px solid #30363d;border-radius:4px;padding:3px 9px;font-size:11px;font-weight:700;color:#8b949e;cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;transition:all .2s;}
.lang-btn:hover{border-color:#8b949e;color:#e6edf3;}
.lang-btn.active{border-color:#26c6da;color:#26c6da;background:rgba(38,198,218,.1);}

/* ── ACCORDION ── */
.acc-section{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:10px;overflow:hidden;}
.acc-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;transition:background .15s;}
.acc-header:hover{background:#21262d;}
.acc-title{font-size:13px;font-weight:700;color:#e6edf3;flex:1;}
.acc-badge{font-size:10px;font-weight:700;border-radius:4px;padding:2px 8px;white-space:nowrap;background:rgba(38,198,218,.1);color:#26c6da;border:1px solid rgba(38,198,218,.3);}
.acc-chevron{font-size:10px;color:#484f58;transition:transform .2s;flex-shrink:0;}
.acc-section.open>.acc-header .acc-chevron{transform:rotate(180deg);}
.acc-body{display:none;padding:0 16px 16px;}
.acc-section.open>.acc-body{display:block;}

/* ── CONTENT ELEMENTS ── */
.doc-sec-hdr{font-size:11px;font-weight:700;color:#26c6da;letter-spacing:.1em;text-transform:uppercase;padding:4px 0;border-bottom:1px solid rgba(38,198,218,.2);margin-bottom:10px;margin-top:18px;}
.doc-sec-hdr:first-child{margin-top:4px;}
.doc-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;}
.doc-tbl th{background:#21262d;font-weight:600;padding:6px 10px;text-align:left;font-size:11px;color:#8b949e;border-bottom:1px solid #30363d;white-space:nowrap;}
.doc-tbl td{padding:6px 10px;border-bottom:1px solid #21262d;vertical-align:top;}
.doc-tbl tr:hover td{background:#161b22;}
.doc-code{display:inline-block;background:#010409;color:#7ec8e3;font-family:'Cascadia Code',Consolas,monospace;font-size:11px;padding:1px 6px;border-radius:3px;border:1px solid #21262d;}
.doc-badge{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;white-space:nowrap;}
.db-active{background:#0d4429;color:#3fb950;}
.db-stub{background:#2d0849;color:#d2a8ff;}
.db-planned{background:#3d1f00;color:#f0883e;}
.doc-fc-dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;flex-shrink:0;}
.doc-p{font-size:12.5px;color:#8b949e;line-height:1.7;margin-bottom:10px;}
.doc-ul{font-size:12px;color:#8b949e;line-height:1.8;padding-left:18px;margin-bottom:10px;}
.doc-ul li{margin-bottom:2px;}
.doc-ul li::marker{color:#26c6da;}
.doc-note{background:#21262d;border-left:3px solid #26c6da;padding:10px 14px;border-radius:0 6px 6px 0;font-size:12px;color:#8b949e;margin-bottom:10px;line-height:1.6;}
.doc-warn{background:rgba(240,136,62,.06);border-left:3px solid #f0883e;padding:10px 14px;border-radius:0 6px 6px 0;font-size:12px;color:#f0883e;margin-bottom:10px;line-height:1.6;}
.doc-ok{background:#0d4429;border-left:3px solid #3fb950;padding:10px 14px;border-radius:0 6px 6px 0;font-size:12px;color:#3fb950;margin-bottom:10px;line-height:1.6;}
.doc-pre{background:#010409;color:#7ec8e3;font-family:'Cascadia Code',Consolas,monospace;font-size:11.5px;line-height:1.7;padding:14px 16px;border-radius:6px;overflow-x:auto;white-space:pre;margin-bottom:10px;border:1px solid #21262d;}
.doc-loading{text-align:center;color:#484f58;padding:40px 20px;font-size:13px;}

/* ── STAT ROW ── */
.doc-stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.doc-stat{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:10px 14px;min-width:100px;text-align:center;}
.doc-stat-val{font-size:22px;font-weight:700;color:#26c6da;font-family:Consolas,monospace;line-height:1;}
.doc-stat-lbl{font-size:10px;color:#8b949e;margin-top:4px;}

/* ── GD-1 ARCHITECTURE ── */
.gd1-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:12px;}
.gd1-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 14px;border-top:3px solid var(--fc-color,#484f58);}
.gd1-card-icon{font-size:16px;margin-bottom:3px;}
.gd1-card-id{font-size:10px;color:#484f58;font-weight:700;letter-spacing:.08em;}
.gd1-card-name{font-size:12px;font-weight:700;color:#e6edf3;margin:2px 0;}
.gd1-card-desc{font-size:10.5px;color:#8b949e;line-height:1.5;margin-bottom:6px;}
.gd1-streams{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.gd1-stream{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 14px;}
.gd1-stream-hdr{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #30363d;}
.gd1-stream.web .gd1-stream-hdr{color:#3fb950;}
.gd1-stream.app .gd1-stream-hdr{color:#f0883e;}
.gd1-stream-item{font-size:11px;color:#c9d1d9;padding:4px 0;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:6px;}
.gd1-stream-item:last-child{border-bottom:none;}

/* ── MERMAID ── */
.mermaid-wrap{background:#010409;border:1px solid #21262d;border-radius:8px;padding:16px;overflow-x:auto;margin-bottom:10px;min-height:80px;}
.mermaid{text-align:center;}

/* ── STEPS ── */
.doc-steps{margin-bottom:10px;}
.doc-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.doc-step-num{width:22px;height:22px;background:#26c6da;color:#010409;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.doc-step-title{font-size:12px;font-weight:700;color:#e6edf3;}
.doc-step-desc{font-size:11.5px;color:#8b949e;line-height:1.6;margin-top:1px;}

/* ── PHASE CARD ── */
.phase-card{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:14px 16px;margin-bottom:8px;}
.phase-card.active{border-left:3px solid #3fb950;}
.phase-card.planned{border-left:3px solid #f0883e;}
.phase-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.phase-card-num{font-size:16px;font-weight:700;font-family:Consolas,monospace;}
.phase-card.active .phase-card-num{color:#3fb950;}
.phase-card.planned .phase-card-num{color:#f0883e;}
.phase-card-name{font-size:13px;font-weight:700;color:#e6edf3;flex:1;}
.phase-card-target{font-size:11px;color:#484f58;}
.phase-card-desc{font-size:12px;color:#8b949e;line-height:1.6;}

/* ── MODULE CHIPS ── */
.module-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.module-chip{background:#21262d;border:1px solid #30363d;border-radius:4px;padding:3px 9px;font-size:11px;color:#e6edf3;}
</style>

// ═══════════════════════════════════════════════════════════
// GLOBALS + HELPERS
// ═══════════════════════════════════════════════════════════
var _oilData = null;
var _mermaidLoaded = false;
var _diagramsRendered = false;
var _oilSource = null;       // 'live' | 'archive' | 'cache' | null
var _archiveInfo = null;     // null v development módu, objekt v archivu

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function badge(text, cls) {
  return '<span class="doc-badge '+(cls||'db-planned')+'">'+esc(text)+'</span>';
}

function step(n, title, descHtml) {
  return '<div class="doc-step">'
    +'<div class="doc-step-num">'+n+'</div>'
    +'<div><div class="doc-step-title">'+esc(title)+'</div>'
    +'<div class="doc-step-desc">'+descHtml+'</div></div>'
    +'</div>';
}

function acc(id, title, badgeTxt, bodyHtml, open) {
  return '<div class="acc-section'+(open?' open':'')+'" id="acc-'+id+'">'
    +'<div class="acc-header" onclick="toggleAcc(\''+id+'\')">'
    +'<span class="acc-title">'+esc(title)+'</span>'
    +(badgeTxt ? '<span class="acc-badge">'+esc(badgeTxt)+'</span>' : '')
    +'<span class="acc-chevron">&#9660;</span>'
    +'</div>'
    +'<div class="acc-body">'+bodyHtml+'</div>'
    +'</div>';
}

function toggleAcc(id) {
  var el = document.getElementById('acc-'+id);
  if (el) {
    el.classList.toggle('open');
    if (_mermaidLoaded && el.classList.contains('open')) {
      try { mermaid.run(); } catch(e) {}
    }
  }
}

// ═══════════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════════
function dcTab(name) {
  document.querySelectorAll('.dc-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.pane === name);
  });
  document.querySelectorAll('.dc-pane').forEach(function(p) {
    p.classList.toggle('active', p.id === 'pane-' + name);
  });
  if (name === 'diag') initDiagrams();
}

function initDiagrams() {
  if (!_diagramsRendered) {
    _diagramsRendered = true;
    renderDiagrams();
    if (!_mermaidLoaded) loadMermaid();
  }
}

// OIL.JSON FETCH
// Priorita cest:
//   1. ../../../OIL.json  — Development (live)
//   2. ../OIL.json        — Archive (snapshot zkopírovaný AUTO_ARCHIVE.bat)
// ═══════════════════════════════════════════════════════════

function loadOIL() {
  var cached = null;
  try { cached = localStorage.getItem('hopi_oil_cache'); } catch(e) {}
  if (cached) {
    try { _oilData = JSON.parse(cached); _oilSource = 'cache'; renderAll(); } catch(e) {}
  }

  // Pokus 1 — vývojová cesta (3 levely nahoru = CO_PROJECT root)
  fetch('../../../OIL.json?_=' + Date.now())
    .then(function(r) { if (!r.ok) throw 0; return r.text(); })
    .then(function(txt) {
      try {
        _oilData = JSON.parse(txt);
        _oilSource = 'live';
        localStorage.setItem('hopi_oil_cache', txt);
      } catch(e) { _oilData = null; }
      renderAll();
    })
    .catch(function() {
      // Pokus 2 — archivní cesta (1 level nahoru = kořen archive session)
      fetch('../OIL.json?_=' + Date.now())
        .then(function(r) { if (!r.ok) throw 0; return r.text(); })
        .then(function(txt) {
          try { _oilData = JSON.parse(txt); _oilSource = 'archive'; } catch(e) { _oilData = null; }
          renderAll();
        })
        .catch(function() {
          _oilSource = cached ? 'cache' : null;
          if (!cached) renderAll();
        });
    });
}

// ARCHIVE INFO — načte VERSION.txt + CHANGELOG.md z archivní složky
// Funguje jen v archivu (../VERSION.txt tam existuje, v Development/ ne)
// ═══════════════════════════════════════════════════════════════════════════
function loadArchiveInfo() {
  fetch('../VERSION.txt?_=' + Date.now())
    .then(function(r) { if (!r.ok) throw 0; return r.text(); })
    .then(function(txt) {
      // FORMAT: session_xxx | YYYY-MM-DD HH:MM | v7.xx | note
      var parts = txt.trim().split(' | ');
      _archiveInfo = {
        session:  (parts[0] || '').trim(),
        date:     (parts[1] || '').trim(),
        version:  (parts[2] || '').trim(),
        note:     (parts[3] || '').trim(),
        changelog: null
      };
      // Načíst CHANGELOG.md ze stejné archivní složky
      return fetch('../CHANGELOG.md?_=' + Date.now());
    })
    .then(function(r) { return r && r.ok ? r.text() : null; })
    .then(function(md) {
      if (md && _archiveInfo) {
        _archiveInfo.changelog = _parseFirstChangelogSection(md);
      }
      // Překreslit TS-1 s archivním panelem
      renderTechSpec();
    })
    .catch(function() {
      // Nejsme v archivu nebo soubory chybí — nic nezobrazit
      _archiveInfo = null;
    });
}

function _parseFirstChangelogSection(md) {
  // Extrahuje první ## sekci z CHANGELOG.md (= nejnovější release)
  // Vrátí pole řádků (max. 60) pro zobrazení
  var lines = md.split('\n');
  var result = [];
  var inSection = false;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.match(/^## /)) {
      if (inSection) break; // konec první sekce
      inSection = true;
      result.push(line);
    } else if (inSection) {
      if (line.match(/^---\s*$/)) break; // oddělovač = konec sekce
      result.push(line);
      if (result.length >= 60) { result.push('…'); break; }
    }
  }
  return result.join('\n').trim();
}

// ── Version stamp — přiřadit DOCS_CONFIG._version z _ver.js ──────────────
// Toto je klíčové: při archivaci se _ver.js zkopíruje spolu s docs/index.html
// → DOCS_CONFIG._version = verze platná v okamžiku archivace
DOCS_CONFIG._version     = (typeof PREZ_VERSION !== 'undefined') ? PREZ_VERSION : '?';
DOCS_CONFIG._archivedAt  = null; // vyplní AUTO_ARCHIVE.bat — viz níže
DOCS_CONFIG._builtAt     = (function() {
  // Pokus načíst _archivedAt z VERSION.txt přes fetch (dostupné jen v archivu)
  fetch('../VERSION.txt').then(function(r){ return r.ok ? r.text() : null; }).then(function(t){
    if (t) DOCS_CONFIG._archivedAt = t.trim().split('|')[1] || null;
  }).catch(function(){});
  return new Date().toISOString().slice(0,10);
})();

// Version in nav
(function() {
  var el = document.getElementById('docVer');
  if (el) el.textContent = DOCS_CONFIG._version;
})();

// i18n
I18n.init();

// Lang button state sync
(function() {
  function syncLangBtns() {
    var lang = I18n.getLang();
    document.querySelectorAll('.lang-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
  }
  syncLangBtns();
  var _orig = I18n.setLang.bind(I18n);
  I18n.setLang = function(l) { _orig(l); syncLangBtns(); };
})();

// Load OIL + render
loadOIL();

// Archive info — detekce archivního módu a načtení release notes
loadArchiveInfo();
</script>
