<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a4a" stroke-width="0.5"/>
    </pattern>
    <!-- Clip to main gauge circle -->
    <clipPath id="main-gauge-clip">
      <circle cx="600" cy="340" r="168"/>
    </clipPath>
    <!-- Radial glow for center -->
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <!-- Top fade -->
    <linearGradient id="top-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#070d1a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════ BACKGROUND ═══════════════════ -->
  <rect width="1200" height="630" fill="#060c18"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>
  <!-- Subtle center glow -->
  <ellipse cx="600" cy="340" rx="350" ry="280" fill="url(#center-glow)"/>

  <!-- ═══════════════════ TITLE AREA ═══════════════════ -->
  <!-- Top separator line -->
  <line x1="0" y1="110" x2="1200" y2="110" stroke="#A855F7" stroke-width="0.5" opacity="0.4"/>

  <!-- MNG COCKPIT main title -->
  <text x="600" y="72" text-anchor="middle"
        fill="white" font-size="64" font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900" letter-spacing="14">MNG COCKPIT</text>

  <!-- Title accent lines -->
  <line x1="180" y1="82" x2="370" y2="82" stroke="#A855F7" stroke-width="1.5" opacity="0.7"/>
  <line x1="830" y1="82" x2="1020" y2="82" stroke="#A855F7" stroke-width="1.5" opacity="0.7"/>
  <circle cx="180" cy="82" r="3" fill="#A855F7"/>
  <circle cx="1020" cy="82" r="3" fill="#A855F7"/>

  <!-- Subtitle -->
  <text x="600" y="100" text-anchor="middle"
        fill="#A855F7" font-size="13" font-family="monospace" letter-spacing="5" opacity="0.9">
    HOPI AppIQ  ·  PROJECT CONTROL CENTER  ·  v8.0
  </text>

  <!-- ═══════════════════ MAIN ATTITUDE INDICATOR ═══════════════════ -->

  <!-- Sky half -->
  <path d="M 430 340 A 170 170 0 0 1 770 340 Z" fill="#0d2040" clip-path="url(#main-gauge-clip)"/>
  <!-- Ground half -->
  <path d="M 430 340 A 170 170 0 0 0 770 340 Z" fill="#1a0e00" clip-path="url(#main-gauge-clip)"/>

  <!-- Outer rings -->
  <circle cx="600" cy="340" r="175" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="340" r="170" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="340" r="168" fill="none" stroke="#A855F7" stroke-width="2.5" opacity="0.9"/>

  <!-- Tick marks (every 30°, 12 ticks) -->
  <!-- Using transform for each tick -->
  <g stroke="#A855F7" stroke-width="2" opacity="0.8">
    <!-- 0° top -->    <line x1="600" y1="167" x2="600" y2="188" transform="rotate(0,600,340)"/>
    <!-- 30° -->       <line x1="600" y1="167" x2="600" y2="180" transform="rotate(30,600,340)"/>
    <!-- 60° -->       <line x1="600" y1="167" x2="600" y2="180" transform="rotate(60,600,340)"/>
    <!-- 90° right --> <line x1="600" y1="167" x2="600" y2="188" transform="rotate(90,600,340)"/>
    <!-- 120° -->      <line x1="600" y1="167" x2="600" y2="180" transform="rotate(120,600,340)"/>
    <!-- 150° -->      <line x1="600" y1="167" x2="600" y2="180" transform="rotate(150,600,340)"/>
    <!-- 180° bot -->  <line x1="600" y1="167" x2="600" y2="188" transform="rotate(180,600,340)"/>
    <!-- 210° -->      <line x1="600" y1="167" x2="600" y2="180" transform="rotate(210,600,340)"/>
    <!-- 240° -->      <line x1="600" y1="167" x2="600" y2="180" transform="rotate(240,600,340)"/>
    <!-- 270° left --> <line x1="600" y1="167" x2="600" y2="188" transform="rotate(270,600,340)"/>
    <!-- 300° -->      <line x1="600" y1="167" x2="600" y2="180" transform="rotate(300,600,340)"/>
    <!-- 330° -->      <line x1="600" y1="167" x2="600" y2="180" transform="rotate(330,600,340)"/>
  </g>

  <!-- Compass labels -->
  <text x="600" y="162" text-anchor="middle" fill="#A855F7" font-size="11" font-family="monospace">N</text>
  <text x="773" y="345" text-anchor="middle" fill="#A855F7" font-size="11" font-family="monospace">E</text>
  <text x="600" y="522" text-anchor="middle" fill="#A855F7" font-size="11" font-family="monospace">S</text>
  <text x="427" y="345" text-anchor="middle" fill="#A855F7" font-size="11" font-family="monospace">W</text>

  <!-- Horizon line -->
  <line x1="432" y1="340" x2="768" y2="340" stroke="#22C55E" stroke-width="2" opacity="0.8" clip-path="url(#main-gauge-clip)"/>

  <!-- Pitch lines (±5°, ±10°) -->
  <line x1="530" y1="311" x2="670" y2="311" stroke="#22C55E" stroke-width="0.8" opacity="0.4" clip-path="url(#main-gauge-clip)"/>
  <line x1="530" y1="369" x2="670" y2="369" stroke="#22C55E" stroke-width="0.8" opacity="0.4" clip-path="url(#main-gauge-clip)"/>
  <line x1="510" y1="283" x2="690" y2="283" stroke="#22C55E" stroke-width="0.8" opacity="0.3" clip-path="url(#main-gauge-clip)"/>
  <line x1="510" y1="397" x2="690" y2="397" stroke="#22C55E" stroke-width="0.8" opacity="0.3" clip-path="url(#main-gauge-clip)"/>

  <!-- Aircraft symbol -->
  <g clip-path="url(#main-gauge-clip)">
    <!-- Left wing -->
    <path d="M 480 340 L 570 340 L 570 333" fill="none" stroke="white" stroke-width="3"/>
    <!-- Right wing -->
    <path d="M 720 340 L 630 340 L 630 333" fill="none" stroke="white" stroke-width="3"/>
    <!-- Nose -->
    <line x1="600" y1="310" x2="600" y2="360" stroke="white" stroke-width="2.5"/>
    <!-- Wing tips down -->
    <line x1="480" y1="340" x2="490" y2="350" stroke="white" stroke-width="2"/>
    <line x1="720" y1="340" x2="710" y2="350" stroke="white" stroke-width="2"/>
  </g>

  <!-- Targeting reticles -->
  <circle cx="600" cy="340" r="60" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.5" stroke-dasharray="6,6"/>
  <circle cx="600" cy="340" r="30" fill="none" stroke="#22C55E" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,5"/>
  <!-- Center dot -->
  <circle cx="600" cy="340" r="5" fill="#22C55E" opacity="0.9"/>
  <circle cx="600" cy="340" r="2" fill="white"/>

  <!-- ═══════════════════ LEFT GAUGES ═══════════════════ -->

  <!-- LEFT TOP: Tasks gauge -->
  <circle cx="230" cy="265" r="80" fill="#07101f" stroke="#A855F7" stroke-width="1.5" opacity="0.95"/>
  <!-- Background ring -->
  <circle cx="230" cy="265" r="68" fill="none" stroke="#1a2640" stroke-width="12"/>
  <!-- Progress arc ~68% (AIQ tasks closed) — r=68, circ≈427, 68%≈290 -->
  <circle cx="230" cy="265" r="68" fill="none" stroke="#A855F7" stroke-width="12"
          stroke-dasharray="290 137" stroke-dashoffset="107" opacity="0.85"/>
  <!-- Inner accent ring -->
  <circle cx="230" cy="265" r="54" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.3"/>
  <text x="230" y="256" text-anchor="middle" fill="#A855F7" font-size="22" font-family="monospace" font-weight="bold">308</text>
  <text x="230" y="274" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">tasks total</text>
  <text x="230" y="292" text-anchor="middle" fill="#A855F7" font-size="10" font-family="monospace" letter-spacing="2">TASKS</text>

  <!-- Gauge label line -->
  <line x1="310" y1="265" x2="380" y2="310" stroke="#A855F7" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,4"/>

  <!-- LEFT BOTTOM: Cash gauge -->
  <circle cx="230" cy="435" r="80" fill="#07101f" stroke="#22C55E" stroke-width="1.5" opacity="0.95"/>
  <circle cx="230" cy="435" r="68" fill="none" stroke="#1a2640" stroke-width="12"/>
  <!-- Progress ~45% -->
  <circle cx="230" cy="435" r="68" fill="none" stroke="#22C55E" stroke-width="12"
          stroke-dasharray="192 235" stroke-dashoffset="107" opacity="0.85"/>
  <circle cx="230" cy="435" r="54" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>
  <text x="230" y="426" text-anchor="middle" fill="#22C55E" font-size="18" font-family="monospace" font-weight="bold">$200K</text>
  <text x="230" y="444" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">pipeline</text>
  <text x="230" y="462" text-anchor="middle" fill="#22C55E" font-size="10" font-family="monospace" letter-spacing="2">CASH</text>

  <line x1="310" y1="435" x2="380" y2="390" stroke="#22C55E" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,4"/>

  <!-- ═══════════════════ RIGHT GAUGES ═══════════════════ -->

  <!-- RIGHT TOP: Timeline gauge -->
  <circle cx="970" cy="265" r="80" fill="#07101f" stroke="#60A5FA" stroke-width="1.5" opacity="0.95"/>
  <circle cx="970" cy="265" r="68" fill="none" stroke="#1a2640" stroke-width="12"/>
  <!-- Progress ~30% to launch -->
  <circle cx="970" cy="265" r="68" fill="none" stroke="#60A5FA" stroke-width="12"
          stroke-dasharray="128 299" stroke-dashoffset="107" opacity="0.85"/>
  <circle cx="970" cy="265" r="54" fill="none" stroke="#60A5FA" stroke-width="0.5" opacity="0.3"/>
  <text x="970" y="253" text-anchor="middle" fill="#60A5FA" font-size="16" font-family="monospace" font-weight="bold">01.01</text>
  <text x="970" y="271" text-anchor="middle" fill="#60A5FA" font-size="16" font-family="monospace" font-weight="bold">2027</text>
  <text x="970" y="289" text-anchor="middle" fill="#888" font-size="9" font-family="monospace">B2C launch</text>
  <text x="970" y="307" text-anchor="middle" fill="#60A5FA" font-size="10" font-family="monospace" letter-spacing="2">TARGET</text>

  <line x1="890" y1="265" x2="820" y2="310" stroke="#60A5FA" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,4"/>

  <!-- RIGHT BOTTOM: Value gauge -->
  <circle cx="970" cy="435" r="80" fill="#07101f" stroke="#F59E0B" stroke-width="1.5" opacity="0.95"/>
  <circle cx="970" cy="435" r="68" fill="none" stroke="#1a2640" stroke-width="12"/>
  <!-- Progress ~55% -->
  <circle cx="970" cy="435" r="68" fill="none" stroke="#F59E0B" stroke-width="12"
          stroke-dasharray="235 192" stroke-dashoffset="107" opacity="0.85"/>
  <circle cx="970" cy="435" r="54" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
  <text x="970" y="423" text-anchor="middle" fill="#F59E0B" font-size="18" font-family="monospace" font-weight="bold">€500K</text>
  <text x="970" y="443" text-anchor="middle" fill="#888" font-size="10" font-family="monospace">valuation</text>
  <text x="970" y="461" text-anchor="middle" fill="#F59E0B" font-size="10" font-family="monospace" letter-spacing="2">VALUE</text>

  <line x1="890" y1="435" x2="820" y2="390" stroke="#F59E0B" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,4"/>

  <!-- ═══════════════════ HUD OVERLAYS ═══════════════════ -->

  <!-- Corner brackets -->
  <path d="M 25 25 L 25 75 M 25 25 L 75 25" stroke="#A855F7" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M 1175 25 L 1175 75 M 1175 25 L 1125 25" stroke="#A855F7" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M 25 605 L 25 555 M 25 605 L 75 605" stroke="#A855F7" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M 1175 605 L 1175 555 M 1175 605 L 1125 605" stroke="#A855F7" stroke-width="2.5" fill="none" opacity="0.8"/>

  <!-- Inner corner brackets (smaller) -->
  <path d="M 100 130 L 100 155 M 100 130 L 125 130" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 1100 130 L 1100 155 M 1100 130 L 1075 130" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Horizontal scan lines from center to gauges -->
  <line x1="25" y1="340" x2="425" y2="340" stroke="#A855F7" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,6"/>
  <line x1="775" y1="340" x2="1175" y2="340" stroke="#A855F7" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,6"/>

  <!-- HUD data readouts (left side) -->
  <text x="45" y="165" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.8">◈ GIT: 109 COMMITS</text>
  <text x="45" y="183" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.7">◈ VER: v7.24 LIVE</text>
  <text x="45" y="201" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.6">◈ ENV: GITHUB PAGES</text>
  <text x="45" y="219" fill="#22C55E" font-size="10" font-family="monospace" opacity="0.5">◈ PHASE: 1 / B2C PREP</text>

  <!-- HUD data readouts (right side) -->
  <text x="960" y="165" fill="#60A5FA" font-size="10" font-family="monospace" opacity="0.8" text-anchor="end">AI: CLAUDE SONNET 4.6 ◈</text>
  <text x="960" y="183" fill="#60A5FA" font-size="10" font-family="monospace" opacity="0.7" text-anchor="end">MODE: ACTIVE SESSION ◈</text>
  <text x="960" y="201" fill="#60A5FA" font-size="10" font-family="monospace" opacity="0.6" text-anchor="end">TEAM: 1 PERSON + AI ◈</text>
  <text x="960" y="219" fill="#60A5FA" font-size="10" font-family="monospace" opacity="0.5" text-anchor="end">STATUS: BUILDING ◈</text>

  <!-- Right side altitude-style readout -->
  <rect x="1130" y="290" width="50" height="100" fill="#07101f" stroke="#A855F7" stroke-width="0.8" opacity="0.6"/>
  <line x1="1130" y1="340" x2="1180" y2="340" stroke="#A855F7" stroke-width="1.5" opacity="0.8"/>
  <text x="1155" y="323" text-anchor="middle" fill="#888" font-size="9" font-family="monospace">2028</text>
  <text x="1155" y="345" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">2027</text>
  <text x="1155" y="363" text-anchor="middle" fill="#888" font-size="9" font-family="monospace">2026</text>

  <!-- Left side speed-style readout -->
  <rect x="20" y="290" width="50" height="100" fill="#07101f" stroke="#22C55E" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="340" x2="70" y2="340" stroke="#22C55E" stroke-width="1.5" opacity="0.8"/>
  <text x="45" y="323" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">€2M</text>
  <text x="45" y="345" text-anchor="middle" fill="white" font-size="9" font-family="monospace" font-weight="bold">€500K</text>
  <text x="45" y="363" text-anchor="middle" fill="#888" font-size="8" font-family="monospace">€200K</text>

  <!-- ═══════════════════ BOTTOM STATUS BAR ═══════════════════ -->
  <rect x="0" y="580" width="1200" height="50" fill="#050b15" opacity="0.98"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#A855F7" stroke-width="1" opacity="0.5"/>

  <!-- Mottos in status bar -->
  <text x="30" y="610" fill="#A855F7" font-size="11" font-family="monospace" font-weight="bold">💰 BUDGET JE SVATÝ</text>
  <text x="250" y="610" fill="#888" font-size="11" font-family="monospace">·</text>
  <text x="270" y="610" fill="#22C55E" font-size="11" font-family="monospace" font-weight="bold">👑 CASH IS KING</text>
  <text x="460" y="610" fill="#888" font-size="11" font-family="monospace">·</text>
  <text x="480" y="610" fill="#60A5FA" font-size="11" font-family="monospace" font-weight="bold">🎯 ALL ACTIONS MUST BE BUSINESS DRIVEN</text>
  <text x="870" y="610" fill="#888" font-size="11" font-family="monospace">·</text>
  <text x="890" y="610" fill="#F59E0B" font-size="11" font-family="monospace" font-weight="bold">🚀 LIVING PROOF FIRST</text>
  <text x="1100" y="610" fill="#888" font-size="11" font-family="monospace">·</text>
  <text x="1120" y="610" fill="#EC4899" font-size="11" font-family="monospace" font-weight="bold">🤖 1+AI</text>

</svg>
