  <link rel="stylesheet" href="_hopiq.css?v=7.21">
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --accent:#00bcd4; --text:#e6edf3; --muted:#8b949e; --green:#3fb950; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; }

    /* ══ WELCOME OVERLAY ══ */
    #welcomeOverlay {
      position:fixed; inset:0; z-index:9000;
      background:radial-gradient(ellipse at 50% 40%,#0d2a1a 0%,#0d1117 70%);
      display:flex; align-items:center; justify-content:center; padding:20px;
      transition:opacity 0.5s ease;
    }
    #welcomeOverlay.hiding { opacity:0; pointer-events:none; }
    .wc-card { text-align:center; max-width:440px; width:100%; animation:wc-fadein 0.6s ease forwards; }
    @keyframes wc-fadein { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .wc-logo { font-size:13px; font-weight:900; letter-spacing:3px; color:#fff; margin-bottom:36px; opacity:.7; }
    .wc-logo .app{color:#E8750A;font-weight:400} .wc-logo .iq{color:#007d32}
    .wc-headline { font-size:2rem; font-weight:800; color:#fff; letter-spacing:-.5px; margin-bottom:10px; }
    .wc-sub { font-size:.82rem; color:var(--muted); margin-bottom:36px; letter-spacing:.5px; }
    .wc-lang-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .wc-lang-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 32px; font-size:.95rem; font-weight:700; color:var(--text); cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:10px; min-width:150px; justify-content:center; }
    .wc-lang-btn:hover { border-color:var(--green); background:rgba(0,125,50,.12); color:var(--green); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,125,50,.2); }
    .wc-lang-cc { display:inline-block; font-size:.65rem; font-weight:900; letter-spacing:.8px; padding:2px 7px; border-radius:4px; }
    .wc-cc-cs { background:rgba(63,185,80,.15); color:#3fb950; border:1px solid rgba(63,185,80,.3); }
    .wc-cc-en { background:rgba(0,188,212,.15); color:var(--accent); border:1px solid rgba(0,188,212,.3); }
    .wc-ver-hint { margin-top:32px; font-size:.68rem; color:rgba(139,148,158,.5); letter-spacing:1px; }
    .wc-neural { margin:0 auto 24px; width:240px; height:160px; }
    .wc-neural svg { width:100%; height:100%; }
    .nn-node { animation:nn-pulse 2.8s ease-in-out infinite; transform-origin:center; }
    .nn-node.d1{animation-delay:0s}.nn-node.d2{animation-delay:.35s}.nn-node.d3{animation-delay:.7s}
    .nn-node.d4{animation-delay:1.05s}.nn-node.d5{animation-delay:1.4s}.nn-node.d6{animation-delay:1.75s}
    .nn-node.d7{animation-delay:2.1s}.nn-node.d8{animation-delay:2.45s}
    @keyframes nn-pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
    .nn-flow { stroke-dasharray:3 9; animation:nn-dash 1.6s linear infinite; }
    .nn-flow.s2{animation-duration:2.1s} .nn-flow.s3{animation-duration:1.3s}
    @keyframes nn-dash { from{stroke-dashoffset:0} to{stroke-dashoffset:-36} }

    /* ══ PROMO FULLSCREEN (bomb) ══ */
    .promo-full {
      position:fixed; inset:0; z-index:7000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:22px; text-align:center; padding:40px 24px;
      overflow:hidden; transform-origin:top center;
    }
    .promo-full.collapsing { animation:pf-collapse .65s cubic-bezier(.55,0,1,.45) forwards; }
    @keyframes pf-collapse {
      0%{transform:scaleY(1);opacity:1} 45%{transform:scaleY(.06) scaleX(1.03);opacity:.85}
      80%{transform:scaleY(.01);opacity:.2} 100%{transform:scaleY(0);opacity:0}
    }
    .pf-icon { font-size:5rem; line-height:1; }
    .pf-label { font-size:.75rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; padding:4px 16px; border-radius:20px; }
    .pf-text  { font-size:clamp(1.3rem,3vw,2rem); font-weight:700; color:#fff; max-width:680px; line-height:1.35; }
    .pf-cta   { font-size:.9rem; font-weight:700; padding:10px 28px; border-radius:8px; text-decoration:none; margin-top:4px; display:inline-block; border:none; cursor:pointer; appearance:none; -webkit-appearance:none; font-family:inherit; }
    .pf-skip  { position:absolute; bottom:18px; right:22px; font-size:.65rem; color:rgba(255,255,255,.25); letter-spacing:.5px; pointer-events:none; }
    .pf-l5 { background:radial-gradient(ellipse at 50% 30%,#500000 0%,#200800 55%,#0d0300 100%); }
    .pf-l5 .pf-icon  { animation:pf-quake .3s ease-in-out infinite; }
    .pf-l5 .pf-label { background:rgba(248,81,73,.15); color:#f85149; border:1px solid rgba(248,81,73,.5); animation:pf-glow-red 1.2s ease-in-out infinite; }
    .pf-l5 .pf-cta   { background:rgba(248,81,73,.2); color:#f85149; border:1px solid rgba(248,81,73,.5); }
    @keyframes pf-quake {
      0%{transform:translate(0,0)rotate(0deg)}15%{transform:translate(-6px,3px)rotate(-1deg)}
      30%{transform:translate(6px,-3px)rotate(1deg)}45%{transform:translate(-4px,4px)rotate(-.5deg)}
      60%{transform:translate(4px,-4px)rotate(.5deg)}100%{transform:translate(0,0)rotate(0deg)}
    }
    @keyframes pf-glow-red { 0%,100%{box-shadow:0 0 6px rgba(248,81,73,.4)} 50%{box-shadow:0 0 20px rgba(248,81,73,.9),0 0 40px rgba(248,81,73,.4)} }
    .pf-orb { width:110px; height:110px; margin:0 auto; }
    .pf-orb svg { width:100%; height:100%; overflow:visible; }
    .pf-orb-r1 { animation:orb-spin 3.5s linear infinite; transform-origin:55px 55px; }
    .pf-orb-r2 { animation:orb-spin 6s linear infinite reverse; transform-origin:55px 55px; }
    .pf-orb-r3 { animation:orb-spin 10s linear infinite; transform-origin:55px 55px; }
    .pf-orb-dot { animation:orb-pulse 2s ease-in-out infinite; transform-origin:55px 55px; }
    @keyframes orb-spin { from{stroke-dashoffset:0} to{stroke-dashoffset:-300} }
    @keyframes orb-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ══ SPARKS ══ */
    .spark { position:absolute; width:5px; height:5px; border-radius:50%; pointer-events:none; animation:spark-fly .9s ease-out forwards; opacity:0; }
    @keyframes spark-fly { 0%{transform:translate(0,0)scale(1);opacity:1} 100%{transform:var(--sdx,translate(40px,-50px))scale(0);opacity:0} }

    @media(max-width:600px){ .wc-lang-btn{min-width:120px;padding:12px 20px;} .pf-text{font-size:1.2rem;} .pf-icon{font-size:3.5rem;} }
  </style>
  <script src="_i18n.js?v=7.21"></script>
</head>
<body>

<!-- ══ WELCOME OVERLAY ══ -->
<div id="welcomeOverlay">
  <div class="wc-card">
    <div class="wc-logo">HOPI <span class="app">App</span><span class="iq">IQ</span></div>
    <div class="wc-neural">
      <svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
        <defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        <line x1="28" y1="48" x2="112" y2="32" stroke="#007d32" stroke-width=".6" opacity=".2"/>
        <line x1="28" y1="48" x2="112" y2="68" stroke="#007d32" stroke-width=".6" opacity=".2"/>
        <line x1="28" y1="48" x2="112" y2="104" stroke="#007d32" stroke-width=".6" opacity=".12"/>
        <line x1="28" y1="82" x2="112" y2="68" stroke="#007d32" stroke-width=".6" opacity=".22"/>
        <line x1="28" y1="82" x2="112" y2="104" stroke="#007d32" stroke-width=".6" opacity=".22"/>
        <line x1="28" y1="116" x2="112" y2="104" stroke="#007d32" stroke-width=".6" opacity=".2"/>
        <line x1="28" y1="116" x2="112" y2="136" stroke="#007d32" stroke-width=".6" opacity=".22"/>
        <line x1="112" y1="32" x2="210" y2="60" stroke="#00bcd4" stroke-width=".6" opacity=".18"/>
        <line x1="112" y1="68" x2="210" y2="60" stroke="#00bcd4" stroke-width=".6" opacity=".22"/>
        <line x1="112" y1="68" x2="210" y2="100" stroke="#00bcd4" stroke-width=".6" opacity=".18"/>
        <line x1="112" y1="104" x2="210" y2="60" stroke="#00bcd4" stroke-width=".6" opacity=".18"/>
        <line x1="112" y1="104" x2="210" y2="100" stroke="#00bcd4" stroke-width=".6" opacity=".22"/>
        <line x1="28" y1="48" x2="112" y2="68" stroke="#3fb950" stroke-width="1.2" opacity=".7" class="nn-flow"/>
        <line x1="28" y1="82" x2="112" y2="104" stroke="#3fb950" stroke-width="1.2" opacity=".6" class="nn-flow s2"/>
        <line x1="28" y1="116" x2="112" y2="32" stroke="#00bcd4" stroke-width="1" opacity=".5" class="nn-flow s3"/>
        <line x1="112" y1="68" x2="210" y2="60" stroke="#00bcd4" stroke-width="1.2" opacity=".7" class="nn-flow"/>
        <line x1="112" y1="104" x2="210" y2="100" stroke="#3fb950" stroke-width="1.2" opacity=".65" class="nn-flow s2"/>
        <circle cx="28" cy="48" r="6" fill="none" stroke="#007d32" stroke-width="1.5" filter="url(#glow)" class="nn-node d1"/>
        <circle cx="28" cy="48" r="3" fill="#007d32" opacity=".8" class="nn-node d1"/>
        <circle cx="28" cy="82" r="6" fill="none" stroke="#007d32" stroke-width="1.5" filter="url(#glow)" class="nn-node d2"/>
        <circle cx="28" cy="82" r="3" fill="#007d32" opacity=".8" class="nn-node d2"/>
        <circle cx="28" cy="116" r="6" fill="none" stroke="#007d32" stroke-width="1.5" filter="url(#glow)" class="nn-node d3"/>
        <circle cx="28" cy="116" r="3" fill="#007d32" opacity=".8" class="nn-node d3"/>
        <circle cx="112" cy="32" r="7" fill="none" stroke="#00bcd4" stroke-width="1.5" filter="url(#glow)" class="nn-node d2"/>

        <circle cx="112" cy="68" r="7" fill="none" stroke="#00bcd4" stroke-width="1.5" filter="url(#glow)" class="nn-node d4"/>
        <circle cx="112" cy="68" r="3.5" fill="#00bcd4" opacity=".7" class="nn-node d4"/>
        <circle cx="112" cy="104" r="7" fill="none" stroke="#00bcd4" stroke-width="1.5" filter="url(#glow)" class="nn-node d5"/>
        <circle cx="112" cy="104" r="3.5" fill="#00bcd4" opacity=".7" class="nn-node d5"/>
        <circle cx="112" cy="136" r="7" fill="none" stroke="#00bcd4" stroke-width="1.5" filter="url(#glow)" class="nn-node d7"/>
        <circle cx="112" cy="136" r="3.5" fill="#00bcd4" opacity=".7" class="nn-node d7"/>
        <circle cx="210" cy="60" r="8" fill="none" stroke="#3fb950" stroke-width="2" filter="url(#glow)" class="nn-node d3"/>
        <circle cx="210" cy="60" r="4" fill="#3fb950" opacity=".85" class="nn-node d3"/>
        <circle cx="210" cy="100" r="8" fill="none" stroke="#3fb950" stroke-width="2" filter="url(#glow)" class="nn-node d6"/>
        <circle cx="210" cy="100" r="4" fill="#3fb950" opacity=".85" class="nn-node d6"/>
        <text x="28" y="148" text-anchor="middle" font-size="7" fill="#30363d" font-family="monospace">INPUT</text>
        <text x="112" y="153" text-anchor="middle" font-size="7" fill="#30363d" font-family="monospace">HIDDEN</text>
        <text x="210" y="118" text-anchor="middle" font-size="7" fill="#30363d" font-family="monospace">OUT</text>
      </svg>
    </div>
    <div class="wc-headline">Ready for AI?</div>
    <div class="wc-sub">Vyberte jazyk &nbsp;·&nbsp; Select language</div>
    <div class="wc-lang-btns">
      <button class="wc-lang-btn" onclick="startApp('cs')"><span class="wc-lang-cc wc-cc-cs">CZ</span> Česky</button>
      <button class="wc-lang-btn" onclick="startApp('en')"><span class="wc-lang-cc wc-cc-en">EN</span> English</button>
    </div>
    <div class="wc-ver-hint" id="wcVerHint"></div>
  </div>
</div>

<script>
(function(){
  'use strict';
  var _versData=null, _pendingLang=null, _audioCtx=null, _bgAudio=null;

  fetch('versions.json?_='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      _versData=d;
      if(d.latest){var h=document.getElementById('wcVerHint');if(h)h.textContent=d.latest;}
      if(_pendingLang) proceed(_pendingLang);
    })
    .catch(function(){_versData={error:true};if(_pendingLang) redirect(_pendingLang,false);});

  window.startApp=function(lang){
    try{if(window.I18n&&I18n.setLang)I18n.setLang(lang);}catch(e){}
    try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
    if(_audioCtx){try{soundWelcome(_audioCtx);}catch(e){}}
    var ov=document.getElementById('welcomeOverlay');
    if(ov) ov.classList.add('hiding');
    if(_versData) proceed(lang); else _pendingLang=lang;
  };

  function proceed(lang){
    var lvl=0;
    try{
      var versions=_versData.versions||[];
      var latest=versions.find(function(v){return v.version===_versData.latest;})||versions[0];
      if(latest&&latest.promoLevel) lvl=parseInt(latest.promoLevel,10)||0;
    }catch(e){}
    if(lvl===5){
      setTimeout(function(){
        var ov=document.getElementById('welcomeOverlay');if(ov)ov.style.display='none';
        showBomb(lang);
      },500);
    } else {
      redirect(lang,false);
    }
  }

  function redirect(lang,music){
    window.location.href='selector.html?lang='+(lang||'cs')+(music?'&music=1':'');
  }

  function showBomb(lang){
    var isEn=(lang==='en');
    var versions=_versData.versions||[];
    var latest=versions.find(function(v){return v.version===_versData.latest;})||versions[0];
    var text=latest?(isEn?(latest.promoTextEn||latest.promoText||''):(latest.promoText||latest.promoTextEn||'')):' ';
    var ctaLabel=isEn?'Explore versions \u2193':'Prozkoumat verze \u2193';
    var skipLabel=isEn?'click anywhere to continue':'kliknut\u00edm kamkoliv pokra\u010dovat';
    var el=document.createElement('div');
    el.className='promo-full pf-l5';
    el.innerHTML=
      '<div class="pf-orb"><svg viewBox="0 0 110 110"><circle cx="55" cy="55" r="18" fill="none" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="28 84" class="pf-orb-r1"/><circle cx="55" cy="55" r="34" fill="none" stroke="#00bcd4" stroke-width="1" opacity=".5" stroke-dasharray="53 160" class="pf-orb-r2"/><circle cx="55" cy="55" r="48" fill="none" stroke="#00bcd4" stroke-width=".6" opacity=".25" stroke-dasharray="75 225" class="pf-orb-r3"/><circle cx="55" cy="55" r="5" fill="#00bcd4" class="pf-orb-dot"/></svg></div>'+
      '<div class="pf-label">\uD83C\uDF0D '+(isEn?'World shook':'Sv\u011bt se zat\u0159\u00e1sl')+'</div>'+
      '<div class="pf-text">'+esc(text)+'</div>'+
      '<button class="pf-cta">'+ctaLabel+'</button>'+
      '<div class="pf-skip">'+skipLabel+'</div>';
    document.body.appendChild(el);
    spawnSparks(el,28,true);
    setTimeout(function(){playMp3Sound(5500);},300);
    var _dismissed=false;
    function dismissFull(){
      if(_dismissed)return;_dismissed=true;
      el.classList.add('collapsing');
      setTimeout(function(){redirect(lang,true);},650);
    }
    el.addEventListener('click',dismissFull);
  }

  function spawnSparks(container,count,big){
    var colors=big?['#f0883e','#ffaa55','#ff6600','#ffcc44']:['#f0883e','#ffaa55'];
    for(var i=0;i<count;i++){
      (function(idx){
        setTimeout(function(){
          var s=document.createElement('span'); s.className='spark';
          var sz=big?(4+Math.random()*6):(3+Math.random()*3);
          s.style.width=s.style.height=sz+'px';
          s.style.background=colors[Math.floor(Math.random()*colors.length)];
          var cx=big?(window.innerWidth/2+((Math.random()-.5)*80)):(60+Math.random()*180);
          var cy=big?(window.innerHeight/2+((Math.random()-.5)*60)):(8+Math.random()*28);
          s.style.left=cx+'px';s.style.top=cy+'px';
          var dx=(Math.random()-.5)*(big?300:60);
          var dy=big?-(80+Math.random()*200):-(20+Math.random()*50);
          s.style.setProperty('--sdx','translate('+dx+'px,'+dy+'px)');
          s.style.animationDelay=(Math.random()*.4)+'s';
          s.style.animationDuration=(.6+Math.random()*.5)+'s';
          container.appendChild(s);
          setTimeout(function(){s.remove();},1500);
        },idx*45);
      })(i);
    }
  }

  function playMp3Sound(duration){
    if(_bgAudio){_bgAudio.pause();_bgAudio=null;}
    var audio=new Audio('_audio/rubyzephyr-imperium-aeternum-v1-430851.mp3');
    audio.volume=0; _bgAudio=audio;
    audio.play().then(function(){
      var fi=setInterval(function(){if(audio.volume<.75){audio.volume=Math.min(.75,audio.volume+.06);}else clearInterval(fi);},40);
      setTimeout(function(){
        var fo=setInterval(function(){if(audio.volume>.03){audio.volume=Math.max(0,audio.volume-.04);}else{audio.pause();clearInterval(fo);_bgAudio=null;}},50);
      },duration);
    }).catch(function(){});
  }

  function tone(c,f,st,dur,type,vol){
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=type||'sine';o.frequency.setValueAtTime(f,c.currentTime+st);
    g.gain.setValueAtTime(0,c.currentTime+st);
    g.gain.linearRampToValueAtTime(vol||.25,c.currentTime+st+.01);
    g.gain.linearRampToValueAtTime(0,c.currentTime+st+dur);
    o.start(c.currentTime+st);o.stop(c.currentTime+st+dur+.05);
  }
  function soundWelcome(c){
    [[261.63,0],[329.63,.12],[392,.24],[523.25,.36]].forEach(function(n){tone(c,n[0],n[1],.45,'sine',.22);});
    tone(c,1046.5,.52,.55,'sine',.12);
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
})();
</script>
</body>
</html>
