<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOPI AppIQ — Published Versions</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --accent: #00bcd4;
      --accent2: #26c6da;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --badge-bg: rgba(0,188,212,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo-bar {
      width: 3px; height: 32px;
      background: #007d32;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 18px; font-weight: 900;
      color: #fff; letter-spacing: 2px; line-height: 1;
    }
    .logo-text .app  { color: #E8750A; font-weight: 400; }
    .logo-text .iq   { color: #007d32; }
    .header-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
    .header-spacer { flex: 1; }
    .header-tag {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 1px;
      color: var(--muted); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── Main ───────────────────────────────── */
    main { flex: 1; max-width: 880px; margin: 0 auto; width: 100%; padding: 44px 24px 60px; }

    .section-label {
      font-size: 0.65rem; font-weight: 700; color: var(--muted);
      letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 14px;
    }

    /* ── Latest card ────────────────────────── */
    .latest-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 44px;
      position: relative;
      overflow: hidden;
    }
    .latest-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 60%, transparent 100%);
    }
    .latest-badge {
      display: inline-block;
      background: var(--badge-bg); border: 1px solid var(--accent);
      color: var(--accent); font-size: 0.62rem; font-weight: 700; letter-spacing: 1.2px;
      padding: 2px 10px; border-radius: 20px; margin-bottom: 14px;
    }
    .latest-ver { font-size: 2.2rem; font-weight: 800; color: var(--accent); line-height: 1.1; }
    .latest-meta { font-size: 0.8rem; color: var(--muted); margin: 6px 0 14px; }
    .latest-title { font-size: 1rem; color: var(--text); line-height: 1.6; margin-bottom: 26px; }
    .latest-links { display: flex; flex-wrap: wrap; gap: 10px; }

    /* ── Buttons ────────────────────────────── */
    .btn {
      display: inline-block; padding: 9px 22px;
      border-radius: 6px; font-size: 0.84rem; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-ghost     { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }

    /* ── Version history list ────────────────── */
    .version-list { display: flex; flex-direction: column; gap: 6px; }
    .version-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    .version-item:hover { border-color: var(--accent); background: rgba(0,188,212,0.04); }
    .vi-ver  { font-size: 0.9rem; font-weight: 700; color: var(--accent); min-width: 58px; }
    .vi-date { font-size: 0.72rem; color: var(--muted); min-width: 88px; }
    .vi-title { font-size: 0.82rem; color: var(--text); flex: 1; line-height: 1.4; }
    .vi-links { display: flex; gap: 6px; flex-shrink: 0; }
    .vi-link {
      font-size: 0.72rem; color: var(--muted);
      text-decoration: none; padding: 3px 9px;
      border: 1px solid var(--border); border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .vi-link:hover { color: var(--accent); border-color: var(--accent); }

    /* ── States ─────────────────────────────── */
    .loading {
      color: var(--muted); font-size: 0.9rem;
      text-align: center; padding: 80px 0;
    }
    .loading::after {
      content: ''; display: block; width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f85149; font-size: 0.85rem; text-align: center; padding: 60px 0; }

    /* ── Protocol Modal ─────────────────────── */
    .gprot-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
    .gprot-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:700px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);}
    .gprot-hdr{padding:18px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .gprot-hdr-main{flex:1;}.gprot-hdr-title{font-size:13px;font-weight:700;color:var(--text);}
    .gprot-hdr-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .gprot-badge{display:inline-block;border-radius:6px;padding:3px 11px;font-size:11px;font-weight:700;flex-shrink:0;}
    .gprot-badge-ok{background:#0d4429;color:#3fb950;border:1px solid #238636;}
    .gprot-badge-warn{background:#3d2800;color:#f0883e;border:1px solid #e67700;}
    .gprot-badge-err{background:#3d0001;color:#f85149;border:1px solid #c62828;}
    .gprot-close{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;color:var(--muted);cursor:pointer;}
    .gprot-close:hover{background:var(--surface2);color:var(--text);}
    .gprot-body{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
    .gprot-sec{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:13px 15px;}
    .gprot-sec-hdr{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;}
    .gprot-chips{display:flex;flex-wrap:wrap;gap:7px;}
    .gprot-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--text);}
    .gprot-chip span{color:var(--muted);font-size:10px;margin-right:3px;}
    .gprot-verify{display:flex;flex-direction:column;gap:4px;}
    .gprot-vi{display:flex;align-items:center;gap:7px;font-size:11px;font-family:Consolas,monospace;}
    .gprot-vi.ok{color:#3fb950;}.gprot-vi.fail{color:#f85149;}
    .gprot-diff-lbl{font-size:11px;font-weight:700;margin-bottom:4px;}
    .gprot-diff-lbl.add{color:#3fb950;}.gprot-diff-lbl.rem{color:#f85149;}.gprot-diff-lbl.chg{color:#f0883e;}
    .gprot-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
    .gprot-pill{font-size:11px;font-family:Consolas,monospace;border-radius:4px;padding:2px 7px;white-space:nowrap;}
    .gprot-pill-a{background:#0d4429;color:#3fb950;}.gprot-pill-r{background:#3d0001;color:#f85149;}
    .gprot-pill-c{background:#3d2800;color:#f0883e;}.gprot-pill-m{background:#21262d;color:var(--muted);}
    .gprot-cl{font-size:11px;font-family:Consolas,monospace;color:#c9d1d9;line-height:1.6;white-space:pre-wrap;max-height:180px;overflow-y:auto;}
    .gprot-nodata{color:var(--muted);font-size:13px;text-align:center;padding:40px 0;}

    /* ── Footer ─────────────────────────────── */
    footer {
      text-align: center; padding: 28px;
      color: var(--muted); font-size: 0.72rem;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Lang switch ────────────────────────────── */
    .lang-switch { display: flex; gap: 4px; align-items: center; }
    .lang-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 9px;
      font-size: 11px; font-weight: 700; color: var(--muted);
      cursor: pointer; font-family: 'Segoe UI', Arial, sans-serif;
      transition: all .2s;
    }
    .lang-btn:hover  { border-color: var(--muted); color: var(--text); }
    .lang-btn.active { border-color: var(--green); color: var(--green); background: rgba(0,125,50,.1); }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      main   { padding: 28px 16px 40px; }
      .latest-card { padding: 20px; }
      .latest-ver  { font-size: 1.7rem; }
      .vi-date, .vi-links { display: none; }
    }
  </style>
  <script src="_i18n.js"></script>
</head>
<body>

  <header>
    <div class="logo-bar"></div>
    <div>
      <div class="logo-text">HOPI <span class="app">App</span><span class="iq">IQ</span></div>
      <div class="header-sub" data-i18n="vs.subtitle">AI-powered Enterprise Application Platform</div>
    </div>
    <div class="header-spacer"></div>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="cs" onclick="setLang('cs')">CZ</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <div class="header-tag" data-i18n="vs.tag">VYDANÉ VERZE</div>
  </header>

  <main>
    <div id="content"><div class="loading">Načítám přehled verzí</div></div>
  </main>

  <footer>
    HOPI AppIQ Studio &nbsp;·&nbsp; <span id="footer-ts"></span>
    &nbsp;·&nbsp; <a href="https://github.com/h-gr-fico/appiq" target="_blank">GitHub</a>
  </footer>

  <script>
    var _versData = null;

    fetch('versions.json?_=' + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        _versData = data;
        render(data);
        I18n.init();
      })
      .catch(function(e) {
        document.getElementById('content').innerHTML =
          '<div class="error">' + (I18n.t('vs.error') || 'Nelze načíst versions.json') +
          '<br><small style="opacity:.6">' + esc(e.message) + '</small></div>';
      });

    function setLang(lang) {
      I18n.setLang(lang);
      if (_versData) render(_versData);
    }

    function render(data) {
      var t = function(k, fb) { return I18n.t(k) || fb; };
      var versions = (data.versions || []).slice();
      versions.sort(function(a, b) { return b.version > a.version ? 1 : -1; });

      var latest = versions.find(function(v) { return v.version === data.latest; }) || versions[0];
      var others = versions.filter(function(v) { return v !== latest; });

      var html = '';

      // ── Latest ──
      if (latest) {
        html += '<div class="section-label">' + t('vs.current', 'Aktuální verze') + '</div>';
        html += '<div class="latest-card">';
        html += '<div class="latest-badge">LATEST</div>';
        html += '<div class="latest-ver">' + esc(latest.version) + '</div>';

        var meta = latest.date || '';
        if (latest.session) meta += (meta ? '  ·  ' : '') + esc(latest.session);
        if (meta) html += '<div class="latest-meta">' + meta + '</div>';

        if (latest.title) html += '<div class="latest-title">' + esc(latest.title) + '</div>';

        html += '<div class="latest-links">';
        if (latest.presentationUrl) html += '<a href="' + esc(latest.presentationUrl) + '" class="btn btn-primary">'  + t('vs.btn.prez', 'Prezentace') + '</a>';
        if (latest.hubUrl)          html += '<a href="' + esc(latest.hubUrl)          + '" class="btn btn-ghost">'    + t('vs.btn.hub',  'Studio Hub') + '</a>';
        if (latest.pitchUrl)        html += '<a href="' + esc(latest.pitchUrl)        + '" class="btn btn-secondary">'+ t('vs.btn.pitch','Personal Pitch') + '</a>';
        if (latest.docsUrl)         html += '<a href="' + esc(latest.docsUrl)         + '" class="btn btn-secondary">'+ t('vs.btn.docs', 'Docs') + '</a>';
        if (latest.protocolUrl)     html += '<button class="btn btn-secondary" onclick="openProtocolModal(\'' + esc(latest.protocolUrl) + '\',\'' + esc(latest.version) + '\')">📋 ' + t('vs.btn.protocol','Protokol') + '</button>';
        html += '</div>';
        html += '</div>'; // .latest-card
      }

      // ── History ──
      if (others.length > 0) {
        html += '<div class="section-label" style="margin-top:36px;">' + t('vs.archived', 'Archivované verze') + ' (' + others.length + ')</div>';
        html += '<div class="version-list">';
        for (var i = 0; i < others.length; i++) {
          var v = others[i];
          html += '<div class="version-item">';
          html += '<div class="vi-ver">'  + esc(v.version)    + '</div>';
          html += '<div class="vi-date">' + esc(v.date || '') + '</div>';
          html += '<div class="vi-title">'+ esc(v.title || '')+ '</div>';
          html += '<div class="vi-links">';
          if (v.presentationUrl) html += '<a href="' + esc(v.presentationUrl) + '" class="vi-link">' + t('vs.btn.prez','Prez') + '</a>';
          if (v.hubUrl)          html += '<a href="' + esc(v.hubUrl)          + '" class="vi-link">' + t('vs.btn.hub', 'Hub')  + '</a>';
          if (v.pitchUrl)        html += '<a href="' + esc(v.pitchUrl)        + '" class="vi-link">' + t('vs.btn.pitch','Pitch')+ '</a>';
          if (v.docsUrl)         html += '<a href="' + esc(v.docsUrl)         + '" class="vi-link">' + t('vs.btn.docs','Docs') + '</a>';
          if (v.protocolUrl)     html += '<button class="vi-link" style="cursor:pointer;background:transparent;" onclick="openProtocolModal(\'' + esc(v.protocolUrl) + '\',\'' + esc(v.version) + '\')">📋</button>';
          html += '</div>';
          html += '</div>';
        }
        html += '</div>';
      }

      if (versions.length === 0) {
        html = '<div class="error">Žádné verze nalezeny v versions.json</div>';
      }

      document.getElementById('content').innerHTML = html;

      if (data.updatedAt) {
        document.getElementById('footer-ts').textContent = (I18n.t('common.updated') || 'Aktualizováno') + ': ' + data.updatedAt;
      }
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Protocol Modal ──────────────────────────────────────────────────────
    function openProtocolModal(url, version) {
      var overlay = document.getElementById('gprotOverlay');
      overlay.style.display = 'flex';
      document.getElementById('gprotTitle').textContent = 'Protokol archivace ' + (version || '');
      document.getElementById('gprotSub').textContent   = '';
      document.getElementById('gprotBadge').textContent = '';
      document.getElementById('gprotBadge').className   = 'gprot-badge';
      document.getElementById('gprotBody').innerHTML    = '<div class="gprot-nodata">Na\u010d\u00edt\u00e1m\u2026</div>';
      fetch(url + '?_=' + Date.now())
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(d) { renderProtocolModal(d); })
        .catch(function(e) {
          document.getElementById('gprotBody').innerHTML =
            '<div class="gprot-nodata">\u26a0\ufe0f Nelze na\u010d\u00edst protokol<br><small style="opacity:.6">' + esc(e.message) + '</small></div>';
        });
    }

    function closeProtocolModal() {
      document.getElementById('gprotOverlay').style.display = 'none';
    }

    function renderProtocolModal(d) {
      var status = d.status || '?';
      var badge  = document.getElementById('gprotBadge');
      badge.textContent = status === 'OK' ? '\u2705 OK' : status === 'WARN' ? '\u26a0\ufe0f WARN' : '\u274c CHYBA';
      badge.className   = 'gprot-badge ' + (status === 'OK' ? 'gprot-badge-ok' : status === 'WARN' ? 'gprot-badge-warn' : 'gprot-badge-err');
      document.getElementById('gprotTitle').textContent = 'Protokol archivace ' + (d.version || '');
      document.getElementById('gprotSub').textContent   = (d.session || '') + (d.timestamp ? '  ·  ' + d.timestamp : '');

      var html = '';
      var st = d.stats || {};

      // Statistiky
      html += '<div class="gprot-sec"><div class="gprot-sec-hdr">\ud83d\udcca Statistiky</div><div class="gprot-chips">';
      html += '<div class="gprot-chip"><span>Soubor\u016f</span>' + esc(st.totalFiles || 0) + '</div>';
      html += '<div class="gprot-chip"><span>Velikost</span>' + (st.totalSizeKb || 0) + ' kB</div>';
      if (st.previousTotal) html += '<div class="gprot-chip"><span>P\u0159edchoz\u00ed</span>' + esc(st.previousTotal) + ' soubor\u016f</div>';
      var bt = st.byType || {};
      Object.keys(bt).sort().forEach(function(ext) {
        html += '<div class="gprot-chip"><span>' + esc(ext) + '</span>' + esc(bt[ext]) + '</div>';
      });
      html += '</div></div>';

      // Verify
      var vf = d.verify || {}; var checks = vf.checks || [];
      html += '<div class="gprot-sec"><div class="gprot-sec-hdr">' +
              (vf.failed === 0 ? '\u2705' : '\u26a0\ufe0f') +
              ' Verify (' + esc(vf.passed || 0) + '/' + esc((vf.passed || 0) + (vf.failed || 0)) + ' OK)</div>';
      html += '<div class="gprot-verify">';
      checks.forEach(function(c) {
        html += '<div class="gprot-vi ' + (c.ok ? 'ok' : 'fail') + '">' + (c.ok ? '\u2713' : '\u2717') + ' ' + esc(c.file) + '</div>';
      });
      html += '</div></div>';

      // Diff
      var df = d.diff || {};
      var added = df.added || [], removed = df.removed || [], changed = df.changed || [];
      html += '<div class="gprot-sec"><div class="gprot-sec-hdr">\ud83d\udd04 Diff' +
              (df.previousSession ? ' oproti ' + esc(df.previousSession) : '') + '</div>';
      if (!added.length && !removed.length && !changed.length) {
        html += '<div style="font-size:12px;color:var(--muted);">Beze zm\u011bn</div>';
      } else {
        if (added.length) {
          html += '<div class="gprot-diff-lbl add">+ ' + added.length + ' p\u0159id\u00e1no</div><div class="gprot-pills">';
          added.slice(0, 12).forEach(function(f) { html += '<span class="gprot-pill gprot-pill-a">' + esc(f) + '</span>'; });
          if (added.length > 12) html += '<span class="gprot-pill gprot-pill-m">+' + (added.length - 12) + ' dal\u0161\u00edch</span>';
          html += '</div>';
        }
        if (removed.length) {
          html += '<div class="gprot-diff-lbl rem">\u2212 ' + removed.length + ' odstran\u011bno</div><div class="gprot-pills">';
          removed.slice(0, 12).forEach(function(f) { html += '<span class="gprot-pill gprot-pill-r">' + esc(f) + '</span>'; });
          if (removed.length > 12) html += '<span class="gprot-pill gprot-pill-m">+' + (removed.length - 12) + ' dal\u0161\u00edch</span>';
          html += '</div>';
        }
        if (changed.length) {
          html += '<div class="gprot-diff-lbl chg">\u007e ' + changed.length + ' zm\u011bn\u011bno</div><div class="gprot-pills">';
          changed.slice(0, 12).forEach(function(f) { html += '<span class="gprot-pill gprot-pill-c">' + esc(f) + '</span>'; });
          if (changed.length > 12) html += '<span class="gprot-pill gprot-pill-m">+' + (changed.length - 12) + ' dal\u0161\u00edch</span>';
          html += '</div>';
        }
      }
      html += '</div>';

      // Changelog
      if (d.changelog) {
        html += '<div class="gprot-sec"><div class="gprot-sec-hdr">\ud83d\udcdd Zm\u011bny v t\u00e9to verzi</div>';
        html += '<pre class="gprot-cl">' + esc(d.changelog) + '</pre></div>';
      }

      document.getElementById('gprotBody').innerHTML = html;
    }
  </script>

  <!-- Protocol Modal -->
  <div class="gprot-overlay" id="gprotOverlay" style="display:none" onclick="if(event.target===this)closeProtocolModal()">
    <div class="gprot-modal">
      <div class="gprot-hdr">
        <div class="gprot-hdr-main">
          <div class="gprot-hdr-title" id="gprotTitle">Protokol archivace</div>
          <div class="gprot-hdr-sub"   id="gprotSub"></div>
        </div>
        <span class="gprot-badge" id="gprotBadge"></span>
        <button class="gprot-close" onclick="closeProtocolModal()">&#10005; Zavřít</button>
      </div>
      <div class="gprot-body" id="gprotBody"><div class="gprot-nodata">Načítám…</div></div>
    </div>
  </div>
</body>
</html>
