<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOPI AppIQ — Published Versions</title>
  <link rel="stylesheet" href="_hopiq.css">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --accent: #00bcd4;
      --accent2: #26c6da;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --badge-bg: rgba(0,188,212,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════
       WELCOME DIALOG
    ══════════════════════════════════════════ */
    #welcomeOverlay {
      position: fixed; inset: 0; z-index: 9000;
      background: radial-gradient(ellipse at 50% 40%, #0d2a1a 0%, #0d1117 70%);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      transition: opacity 0.5s ease;
    }
    #welcomeOverlay.hiding { opacity: 0; pointer-events: none; }

    .wc-card {
      text-align: center;
      max-width: 440px; width: 100%;
      animation: wc-fadein 0.6s ease forwards;
    }
    @keyframes wc-fadein {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wc-logo {
      font-size: 13px; font-weight: 900; letter-spacing: 3px;
      color: #fff; margin-bottom: 36px; opacity: 0.7;
    }
    .wc-logo .app { color: #E8750A; font-weight: 400; }
    .wc-logo .iq  { color: #007d32; }

    .wc-neural { margin: 0 auto 24px; width: 240px; height: 160px; }
    .wc-neural svg { width: 100%; height: 100%; }

    .nn-node {
      animation: nn-pulse 2.8s ease-in-out infinite;
      transform-origin: center;
    }
    .nn-node.d1 { animation-delay: 0s; }
    .nn-node.d2 { animation-delay: 0.35s; }
    .nn-node.d3 { animation-delay: 0.7s; }
    .nn-node.d4 { animation-delay: 1.05s; }
    .nn-node.d5 { animation-delay: 1.4s; }
    .nn-node.d6 { animation-delay: 1.75s; }
    .nn-node.d7 { animation-delay: 2.1s; }
    .nn-node.d8 { animation-delay: 2.45s; }
    @keyframes nn-pulse {
      0%, 100% { opacity: 0.55; r: 6; }
      50%       { opacity: 1;    r: 8; }
    }

    .nn-flow {
      stroke-dasharray: 3 9;
      animation: nn-dash 1.6s linear infinite;
    }
    .nn-flow.s2 { animation-duration: 2.1s; }
    .nn-flow.s3 { animation-duration: 1.3s; }
    @keyframes nn-dash {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -36; }
    }

    .wc-headline {
      font-size: 2rem; font-weight: 800; color: #fff;
      letter-spacing: -0.5px; margin-bottom: 10px;
    }
    .wc-sub {
      font-size: 0.82rem; color: var(--muted); margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    .wc-lang-btns {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    }
    .wc-lang-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 0.95rem; font-weight: 700;
      color: var(--text); cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 10px;
      min-width: 150px; justify-content: center;
    }
    .wc-lang-btn:hover {
      border-color: var(--green);
      background: rgba(0,125,50,0.12);
      color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,125,50,0.2);
    }
    .wc-lang-flag { font-size: 1.4rem; }
    .wc-ver-hint {
      margin-top: 32px; font-size: 0.68rem; color: rgba(139,148,158,0.5);
      letter-spacing: 1px;
    }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; align-items: center; gap: 20px;
    }
    .logo-bar { width: 3px; height: 32px; background: #007d32; border-radius: 2px; flex-shrink: 0; }
    .logo-text { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 2px; line-height: 1; }
    .logo-text .app { color: #E8750A; font-weight: 400; }
    .logo-text .iq  { color: #007d32; }
    .header-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
    .header-spacer { flex: 1; }
    .header-tag {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 1px;
      color: var(--muted); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
    }

    /* ══════════════════════════════════════════
       STATUS BAR
    ══════════════════════════════════════════ */
    #statusBar {
      background: rgba(63,185,80,0.06);
      border-bottom: 1px solid rgba(63,185,80,0.18);
      padding: 7px 32px;
      display: none; align-items: center; gap: 14px;
      font-size: 0.72rem; color: var(--muted);
    }
    #statusBar.visible { display: flex; }
    .sb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px rgba(63,185,80,0.6); }
    .sb-live { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; color: var(--green); }
    .sb-ver  { font-weight: 700; color: var(--text); }
    .sb-sep  { color: var(--border); }
    .sb-spacer { flex: 1; }
    .sb-commit { font-family: Consolas, monospace; font-size: 0.68rem; color: var(--muted); }

    /* ══════════════════════════════════════════
       PROMO BANNER — base
    ══════════════════════════════════════════ */
    #promoBanner {
      display: none;
      padding: 16px 32px;
      position: relative; overflow: hidden;
    }
    #promoBanner.visible { display: block; }

    .promo-inner {
      max-width: 880px; margin: 0 auto;
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
    }
    .promo-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.68rem; font-weight: 800; letter-spacing: 1.2px;
      padding: 4px 12px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
      text-transform: uppercase;
    }
    .promo-icon { font-size: 1rem; }
    .promo-text {
      font-size: 0.9rem; font-weight: 600; flex: 1;
      line-height: 1.4;
    }
    .promo-cta {
      font-size: 0.75rem; font-weight: 700;
      padding: 5px 14px; border-radius: 5px;
      cursor: pointer; border: none; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    .promo-cta:hover { opacity: 0.8; }
    .promo-sound-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 1rem; padding: 2px 4px; opacity: 0.5;
      transition: opacity 0.15s; flex-shrink: 0;
    }
    .promo-sound-btn:hover { opacity: 1; }

    /* Level 1 — Tweak */
    .promo-l1 { background: rgba(48,54,61,0.5); border-bottom: 1px solid #30363d; }
    .promo-l1 .promo-badge { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .promo-l1 .promo-text  { color: var(--muted); }
    .promo-l1 .promo-cta   { background: #21262d; color: var(--muted); border: 1px solid #30363d; }

    /* Level 2 — Update */
    .promo-l2 { background: rgba(0,66,104,0.25); border-bottom: 1px solid rgba(0,188,212,0.25); }
    .promo-l2 .promo-badge { background: rgba(0,188,212,0.12); color: var(--accent); border: 1px solid rgba(0,188,212,0.35); }
    .promo-l2 .promo-text  { color: var(--text); }
    .promo-l2 .promo-cta   { background: rgba(0,188,212,0.15); color: var(--accent); border: 1px solid rgba(0,188,212,0.4); }
    .promo-l2 .promo-badge { animation: pulse-blue 2.5s ease-in-out infinite; }
    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,188,212,0); }
      50%       { box-shadow: 0 0 0 5px rgba(0,188,212,0.12); }
    }

    /* Level 3 — Feature */
    .promo-l3 { background: rgba(0,60,20,0.3); border-bottom: 1px solid rgba(63,185,80,0.3); }
    .promo-l3 .promo-badge { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.4); }
    .promo-l3 .promo-text  { color: var(--text); }
    .promo-l3 .promo-cta   { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.4); }
    .promo-l3 .promo-badge { animation: glow-green 2s ease-in-out infinite; }
    @keyframes glow-green {
      0%, 100% { box-shadow: 0 0 4px rgba(63,185,80,0.3); }
      50%       { box-shadow: 0 0 12px rgba(63,185,80,0.6); }
    }

    /* Level 4 — Bomba vybuchla */
    .promo-l4 { background: linear-gradient(135deg, rgba(60,20,0,0.6) 0%, rgba(30,10,0,0.4) 100%); border-bottom: 2px solid rgba(240,136,62,0.5); }
    .promo-l4 .promo-badge { background: rgba(240,136,62,0.15); color: #f0883e; border: 1px solid rgba(240,136,62,0.5); animation: shake-badge 0.4s ease 0.8s 3; }
    .promo-l4 .promo-text  { color: #f0d9c0; font-size: 0.95rem; }
    .promo-l4 .promo-cta   { background: rgba(240,136,62,0.2); color: #f0883e; border: 1px solid rgba(240,136,62,0.5); }
    @keyframes shake-badge {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      20%       { transform: translateX(-3px) rotate(-2deg); }
      40%       { transform: translateX(3px) rotate(2deg); }
      60%       { transform: translateX(-2px) rotate(-1deg); }
      80%       { transform: translateX(2px) rotate(1deg); }
    }
    .promo-l4 .promo-sparks { pointer-events: none; }
    .spark {
      position: absolute; width: 4px; height: 4px;
      border-radius: 50%; background: #f0883e;
      animation: spark-fly 0.8s ease-out forwards;
      opacity: 0;
    }
    @keyframes spark-fly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: var(--dx, translate(30px,-40px)) scale(0); opacity: 0; }
    }

    /* Level 5 — Svět se zatřásl */
    .promo-l5 {
      background: linear-gradient(135deg, rgba(60,0,0,0.7) 0%, rgba(50,30,0,0.6) 50%, rgba(60,0,0,0.7) 100%);
      border-bottom: 2px solid rgba(248,81,73,0.6);
      animation: quake 0.6s ease 0.5s 2;
    }
    @keyframes quake {
      0%  { transform: translate(0,0); }
      15% { transform: translate(-4px, 2px); }
      30% { transform: translate(4px, -2px); }
      45% { transform: translate(-3px, 3px); }
      60% { transform: translate(3px, -3px); }
      75% { transform: translate(-2px, 1px); }
      100%{ transform: translate(0,0); }
    }
    .promo-l5 .promo-badge { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.5); animation: glow-red 1.5s ease-in-out infinite; }
    .promo-l5 .promo-text  { color: #ffd0cd; font-size: 0.95rem; font-weight: 700; }
    .promo-l5 .promo-cta   { background: rgba(248,81,73,0.2); color: #f85149; border: 1px solid rgba(248,81,73,0.5); }
    @keyframes glow-red {
      0%, 100% { box-shadow: 0 0 6px rgba(248,81,73,0.4); }
      50%       { box-shadow: 0 0 18px rgba(248,81,73,0.8), 0 0 30px rgba(248,81,73,0.3); }
    }
    .flash-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 8999;
      background: rgba(255,180,0,0.08);
      animation: flash-in 1.2s ease forwards;
    }
    @keyframes flash-in {
      0%  { opacity: 0; }
      5%  { opacity: 1; }
      20% { opacity: 0.3; }
      40% { opacity: 0.8; }
      60% { opacity: 0.1; }
      100%{ opacity: 0; }
    }

    /* ══════════════════════════════════════════
       MAIN
    ══════════════════════════════════════════ */
    main { flex: 1; max-width: 880px; margin: 0 auto; width: 100%; padding: 44px 24px 60px; }
    .section-label {
      font-size: 0.65rem; font-weight: 700; color: var(--muted);
      letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 14px;
    }

    /* ── Latest card ────────────────────────── */
    .latest-card {
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 12px; padding: 28px 32px; margin-bottom: 44px;
      position: relative; overflow: hidden;
    }
    .latest-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 60%, transparent 100%);
    }
    .latest-badge {
      display: inline-block;
      background: var(--badge-bg); border: 1px solid var(--accent);
      color: var(--accent); font-size: 0.62rem; font-weight: 700; letter-spacing: 1.2px;
      padding: 2px 10px; border-radius: 20px; margin-bottom: 14px;
    }
    .latest-ver   { font-size: 2.2rem; font-weight: 800; color: var(--accent); line-height: 1.1; }
    .latest-meta  { font-size: 0.8rem; color: var(--muted); margin: 6px 0 14px; }
    .latest-title { font-size: 1rem; color: var(--text); line-height: 1.6; margin-bottom: 26px; }
    .latest-links { display: flex; flex-wrap: wrap; gap: 10px; }

    /* ── Buttons ────────────────────────────── */
    .btn { display: inline-block; padding: 9px 22px; border-radius: 6px; font-size: 0.84rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-ghost     { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn-hero { background: var(--green); color: #fff; font-size: 0.9rem; font-weight: 700; padding: 10px 26px; border-radius: 6px; text-decoration: none; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-hero:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── Version list ────────────────────────── */
    .version-list { display: flex; flex-direction: column; gap: 6px; }
    .version-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; display: flex; align-items: center; gap: 14px; transition: border-color 0.15s, background 0.15s; }
    .version-item:hover { border-color: var(--accent); background: rgba(0,188,212,0.04); }
    .vi-ver   { font-size: 0.9rem; font-weight: 700; color: var(--accent); min-width: 58px; }
    .vi-date  { font-size: 0.72rem; color: var(--muted); min-width: 88px; }
    .vi-title { font-size: 0.82rem; color: var(--text); flex: 1; line-height: 1.4; }
    .vi-links { display: flex; gap: 6px; flex-shrink: 0; }
    .vi-link  { font-size: 0.72rem; color: var(--muted); text-decoration: none; padding: 3px 9px; border: 1px solid var(--border); border-radius: 4px; transition: color 0.15s, border-color 0.15s; }
    .vi-link:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Version summary ─────────────────────── */
    .ver-summary { margin: 16px 0 20px; display: flex; flex-direction: column; gap: 4px; }
    .ver-summary-item { font-size: 0.78rem; color: var(--muted); padding-left: 14px; position: relative; line-height: 1.55; }
    .ver-summary-item::before { content: '•'; position: absolute; left: 0; color: var(--accent); }

    /* ── Release notes feed ─────────────────── */
    .rn-feed { display: flex; flex-direction: column; gap: 0; }
    .rn-entry { border-left: 2px solid var(--border); padding: 0 0 32px 22px; margin-left: 6px; position: relative; }
    .rn-entry:last-child { padding-bottom: 0; border-left-color: transparent; }
    .rn-entry::before { content: ''; position: absolute; left: -5px; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
    .rn-entry.rn-latest::before { background: var(--green); box-shadow: 0 0 8px rgba(63,185,80,0.5); }
    .rn-hdr { display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .rn-ver  { font-size: 0.88rem; font-weight: 700; color: var(--accent); }
    .rn-entry.rn-latest .rn-ver { color: var(--green); }
    .rn-date  { font-size: 0.7rem; color: var(--muted); }
    .rn-title { font-size: 0.78rem; color: var(--muted); }
    .rn-latest-pill { font-size: 0.6rem; font-weight: 700; letter-spacing: .8px; background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.3); color: var(--green); padding: 1px 8px; border-radius: 20px; }
    .rn-changes { display: flex; flex-direction: column; gap: 5px; }
    .rn-change { font-size: 0.78rem; color: var(--text); padding-left: 14px; position: relative; line-height: 1.55; }
    .rn-change::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
    .rn-no-changes { font-size: 0.75rem; color: var(--muted); font-style: italic; }

    /* ── Changes modal ──────────────────────── */
    .chg-list { display: flex; flex-direction: column; }
    .chg-item { padding: 9px 0 9px 18px; position: relative; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); line-height: 1.6; }
    .chg-item:last-child { border-bottom: none; }
    .chg-item::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

    /* ── Protocol Modal ─────────────────────── */
    .gprot-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
    .gprot-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:700px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);}
    .gprot-hdr{padding:18px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .gprot-hdr-main{flex:1;}.gprot-hdr-title{font-size:13px;font-weight:700;color:var(--text);}
    .gprot-hdr-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .gprot-badge{display:inline-block;border-radius:6px;padding:3px 11px;font-size:11px;font-weight:700;flex-shrink:0;}
    .gprot-badge-ok{background:#0d4429;color:#3fb950;border:1px solid #238636;}
    .gprot-badge-warn{background:#3d2800;color:#f0883e;border:1px solid #e67700;}
    .gprot-badge-err{background:#3d0001;color:#f85149;border:1px solid #c62828;}
    .gprot-close{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;color:var(--muted);cursor:pointer;}
    .gprot-close:hover{background:var(--surface2);color:var(--text);}
    .gprot-body{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
    .gprot-sec{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:13px 15px;}
    .gprot-sec-hdr{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;}
    .gprot-chips{display:flex;flex-wrap:wrap;gap:7px;}
    .gprot-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--text);}
    .gprot-chip span{color:var(--muted);font-size:10px;margin-right:3px;}
    .gprot-verify{display:flex;flex-direction:column;gap:4px;}
    .gprot-vi{display:flex;align-items:center;gap:7px;font-size:11px;font-family:Consolas,monospace;}
    .gprot-vi.ok{color:#3fb950;}.gprot-vi.fail{color:#f85149;}
    .gprot-diff-lbl{font-size:11px;font-weight:700;margin-bottom:4px;}
    .gprot-diff-lbl.add{color:#3fb950;}.gprot-diff-lbl.rem{color:#f85149;}.gprot-diff-lbl.chg{color:#f0883e;}
    .gprot-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
    .gprot-pill{font-size:11px;font-family:Consolas,monospace;border-radius:4px;padding:2px 7px;white-space:nowrap;}
    .gprot-pill-a{background:#0d4429;color:#3fb950;}.gprot-pill-r{background:#3d0001;color:#f85149;}
    .gprot-pill-c{background:#3d2800;color:#f0883e;}.gprot-pill-m{background:#21262d;color:var(--muted);}
    .gprot-cl{font-size:11px;font-family:Consolas,monospace;color:#c9d1d9;line-height:1.6;white-space:pre-wrap;max-height:180px;overflow-y:auto;}
    .gprot-nodata{color:var(--muted);font-size:13px;text-align:center;padding:40px 0;}

    /* ── Lang switch ────────────────────────── */
    .lang-switch { display: flex; gap: 4px; align-items: center; }
    .lang-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 3px 9px; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; font-family: 'Segoe UI', Arial, sans-serif; transition: all .2s; }
    .lang-btn:hover  { border-color: var(--muted); color: var(--text); }
    .lang-btn.active { border-color: var(--green); color: var(--green); background: rgba(0,125,50,.1); }

    /* ── States ─────────────────────────────── */
    .loading { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 80px 0; }
    .loading::after { content: ''; display: block; width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f85149; font-size: 0.85rem; text-align: center; padding: 60px 0; }

    /* ── Footer ─────────────────────────────── */
    footer { text-align: center; padding: 28px; color: var(--muted); font-size: 0.72rem; border-top: 1px solid var(--border); }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      #statusBar, #promoBanner { padding: 8px 16px; }
      main   { padding: 28px 16px 40px; }
      .latest-card { padding: 20px; }
      .latest-ver  { font-size: 1.7rem; }
      .vi-date, .vi-links { display: none; }
      .wc-lang-btn { min-width: 120px; padding: 12px 20px; }
    }
  </style>
  <script src="_i18n.js"></script>
</head>

  <script>
  (function() {
    'use strict';

    var _versData   = null;
    var _changesData = {};
    var _appStarted  = false;
    var _audioCtx    = null;

    // ── Fetch versions.json immediately (background) ─────────────────────────
    fetch('versions.json?_=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(data) {
        _versData = data;
        // Show version hint in welcome dialog
        if (data.latest) document.getElementById('wcVerHint').textContent = data.latest;
        if (_appStarted) renderAll(data);
      })
      .catch(function(e) {
        _versData = { error: e.message };
        if (_appStarted) showError(e.message);
      });

    // ── Welcome dialog ───────────────────────────────────────────────────────
    window.startApp = function(lang) {
      _appStarted = true;
      I18n.setLang(lang);
      updateLangBtns(lang);

      // Init audio context on user gesture
      try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}

      // Play welcome sound
      if (_audioCtx) soundWelcome(_audioCtx);

      // Hide welcome overlay
      var overlay = document.getElementById('welcomeOverlay');
      overlay.classList.add('hiding');
      setTimeout(function() { overlay.style.display = 'none'; }, 500);

      // Render if data ready
      if (_versData && !_versData.error) renderAll(_versData);
      else if (_versData && _versData.error) showError(_versData.error);
      // else: data not yet — will render when fetch completes
    };

    // Lang switch in header (after welcome)
    window.switchLang = function(lang) {
      I18n.setLang(lang);
      updateLangBtns(lang);
      if (_versData && !_versData.error) renderAll(_versData);
    };

    function updateLangBtns(lang) {
      document.querySelectorAll('.lang-btn').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
    }

    function showError(msg) {
      document.getElementById('content').innerHTML =
        '<div class="error">' + (I18n.t('vs.error') || 'Nelze načíst versions.json') +
        '<br><small style="opacity:.6">' + esc(msg) + '</small></div>';
    }

    // ── Render all ───────────────────────────────────────────────────────────
    function renderAll(data) {
      renderStatusBar(data);
      renderPromoBanner(data);
      render(data);
      I18n.applyDOM(document.body);
    }

    function renderStatusBar(data) {
      var versions = data.versions || [];
      var latest = versions.find(function(v) { return v.version === data.latest; }) || versions[0];
      if (!latest) return;
      document.getElementById('sbVer').textContent     = latest.version;
      document.getElementById('sbDate').textContent    = latest.date || '';
      document.getElementById('sbSession').textContent = latest.session || '';
      var status = window._STUDIO_STATUS;
      if (status && status.deployCommit)
        document.getElementById('sbCommit').textContent = 'commit ' + status.deployCommit;
      document.getElementById('statusBar').classList.add('visible');
    }

    // ── PROMO Banner ─────────────────────────────────────────────────────────
    var LEVEL_META = [
      null, // index 0 unused
      { cs: 'Tweak',           en: 'Tweak',           icon: '🔧', cls: 'promo-l1' },
      { cs: 'Update',          en: 'Update',          icon: '⚡', cls: 'promo-l2' },
      { cs: 'Feature',         en: 'Feature',         icon: '🚀', cls: 'promo-l3' },
      { cs: 'Bomba vybuchla',  en: 'Bomb dropped',    icon: '💥', cls: 'promo-l4' },
      { cs: 'Svět se zatřásl', en: 'World shook',     icon: '🌍', cls: 'promo-l5' }
    ];

    function renderPromoBanner(data) {
      var versions = data.versions || [];
      var latest = versions.find(function(v) { return v.version === data.latest; }) || versions[0];
      if (!latest || !latest.promoLevel) return;

      var lvl = parseInt(latest.promoLevel, 10) || 1;
      if (lvl < 1 || lvl > 5) return;

      var isEn  = I18n.getLang && I18n.getLang() === 'en';
      var meta  = LEVEL_META[lvl];
      var label = isEn ? meta.en : meta.cs;
      var text  = isEn
        ? (latest.promoTextEn || latest.promoText || '')
        : (latest.promoText   || latest.promoTextEn || '');
      var mainUrl = latest.mainUrl || latest.hubUrl || '';

      var banner = document.getElementById('promoBanner');
      banner.className = '';
      banner.classList.add(meta.cls);
      banner.classList.add('visible');

      var ctaLabel = isEn ? 'See what\'s new →' : 'Co je nového →';

      document.getElementById('promoInner').innerHTML =
        '<span class="promo-badge"><span class="promo-icon">' + meta.icon + '</span>' + esc(label) + '</span>' +
        '<span class="promo-text">' + esc(text) + '</span>' +
        (mainUrl ? '<a href="' + esc(mainUrl) + '" class="promo-cta">' + ctaLabel + '</a>' : '') +
        '<button class="promo-sound-btn" onclick="replayPromoSound(' + lvl + ')" title="' + (isEn ? 'Replay sound' : 'Přehrát zvuk') + '">🔊</button>';

      // Sparks for level 4
      if (lvl === 4) spawnSparks(banner, 12);
      // Flash overlay for level 5
      if (lvl === 5) {
        var fl = document.createElement('div');
        fl.className = 'flash-overlay';
        document.body.appendChild(fl);
        setTimeout(function() { fl.remove(); }, 1500);
      }

      // Play promo level sound after short delay
      setTimeout(function() {
        if (_audioCtx) playSoundForLevel(_audioCtx, lvl);
      }, 800);
    }

    function spawnSparks(container, count) {
      for (var i = 0; i < count; i++) {
        (function(idx) {
          setTimeout(function() {
            var s = document.createElement('span');
            s.className = 'spark';
            var x = 60 + Math.random() * 200;
            var y = 10 + Math.random() * 30;
            var dx = (Math.random() - 0.5) * 60;
            var dy = -(20 + Math.random() * 40);
            s.style.left = x + 'px';
            s.style.top  = y + 'px';
            s.style.setProperty('--dx', 'translate(' + dx + 'px,' + dy + 'px)');
            s.style.animationDelay = (Math.random() * 0.3) + 's';
            container.appendChild(s);
            setTimeout(function() { s.remove(); }, 1200);
          }, idx * 60);
        })(i);
      }
    }

    window.replayPromoSound = function(lvl) {
      if (!_audioCtx) {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      if (_audioCtx) playSoundForLevel(_audioCtx, lvl);
    };

    // ── Main content render ──────────────────────────────────────────────────
    function render(data) {
      var t = function(k, fb) { return I18n.t(k) || fb; };
      _changesData = {};
      var versions = (data.versions || []).slice();
      versions.sort(function(a, b) { return b.version > a.version ? 1 : -1; });

      var latest = versions.find(function(v) { return v.version === data.latest; }) || versions[0];
      var others = versions.filter(function(v) { return v !== latest; });
      var html = '';

      if (latest) {
        if (latest.changes && latest.changes.length) _changesData[latest.version] = latest.changes;
        html += '<div class="section-label">' + t('vs.current', 'Aktuální verze') + '</div>';
        html += '<div class="latest-card">';
        html += '<div class="latest-badge">LATEST</div>';
        html += '<div class="latest-ver">' + esc(latest.version) + '</div>';
        var meta = latest.date || '';
        if (latest.session) meta += (meta ? '  ·  ' : '') + esc(latest.session);
        if (meta) html += '<div class="latest-meta">' + meta + '</div>';
        if (latest.title) html += '<div class="latest-title">' + esc(latest.title) + '</div>';
        if (latest.mainUrl) {
          html += '<div style="margin:18px 0 10px"><a href="' + esc(latest.mainUrl) + '" class="btn btn-hero">' + esc(latest.mainLabel || t('vs.btn.open','Otevřít')) + ' →</a></div>';
        }
        if (latest.changes && latest.changes.length) {
          html += '<div class="ver-summary">';
          latest.changes.forEach(function(c) { html += '<div class="ver-summary-item">' + esc(c) + '</div>'; });
          html += '</div>';
        }
        html += '<div class="latest-links">';
        if (latest.changes && latest.changes.length)
          html += '<button class="btn btn-secondary" onclick="openChangesModal(\'' + esc(latest.version) + '\')">' + t('vs.btn.changes','Detailní změny') + '</button>';
        if (latest.presentationUrl) html += '<a href="' + esc(latest.presentationUrl) + '" class="btn btn-ghost">'    + t('vs.btn.prez','Prezentace')    + '</a>';
        if (latest.pitchUrl)        html += '<a href="' + esc(latest.pitchUrl)        + '" class="btn btn-secondary">'+ t('vs.btn.pitch','Personal Pitch')+ '</a>';
        if (latest.docsUrl)         html += '<a href="' + esc(latest.docsUrl)         + '" class="btn btn-secondary">'+ t('vs.btn.docs','Docs')           + '</a>';
        if (latest.protocolUrl)     html += '<button class="btn btn-secondary" onclick="openProtocolModal(\'' + esc(latest.protocolUrl) + '\',\'' + esc(latest.version) + '\')">&#128203; ' + t('vs.btn.protocol','Protokol') + '</button>';
        html += '</div></div>';
      }

      if (others.length > 0) {
        html += '<div class="section-label" style="margin-top:36px;">' + t('vs.archived','Archivované verze') + ' (' + others.length + ')</div>';
        html += '<div class="version-list">';
        others.forEach(function(v) {
          if (v.changes && v.changes.length) _changesData[v.version] = v.changes;
          html += '<div class="version-item">';
          html += '<div class="vi-ver">'  + esc(v.version)    + '</div>';
          html += '<div class="vi-date">' + esc(v.date || '') + '</div>';
          html += '<div class="vi-title">'+ esc(v.title || '')+ '</div>';
          html += '<div class="vi-links">';
          if (v.mainUrl)         html += '<a href="' + esc(v.mainUrl) + '" class="vi-link" style="font-weight:700;color:var(--green);border-color:var(--green);">' + esc(v.mainLabel || t('vs.btn.open','Otevřít')) + '</a>';
          if (v.changes && v.changes.length)
            html += '<button class="vi-link" style="cursor:pointer;background:transparent;" onclick="openChangesModal(\'' + esc(v.version) + '\')">' + t('vs.btn.changes','Detailní změny') + '</button>';
          if (v.presentationUrl) html += '<a href="' + esc(v.presentationUrl) + '" class="vi-link">' + t('vs.btn.prez','Prez')  + '</a>';
          if (v.pitchUrl)        html += '<a href="' + esc(v.pitchUrl)        + '" class="vi-link">' + t('vs.btn.pitch','Pitch')+ '</a>';
          if (v.docsUrl)         html += '<a href="' + esc(v.docsUrl)         + '" class="vi-link">' + t('vs.btn.docs','Docs')  + '</a>';
          if (v.protocolUrl)     html += '<button class="vi-link" style="cursor:pointer;background:transparent;" onclick="openProtocolModal(\'' + esc(v.protocolUrl) + '\',\'' + esc(v.version) + '\')">&#128203;</button>';
          html += '</div></div>';
        });
        html += '</div>';
      }

      // Release notes feed
      html += '<div class="section-label" style="margin-top:48px;">' + t('vs.relnotes','Release Notes') + '</div>';
      html += '<div class="rn-feed">';
      versions.forEach(function(rv) {
        var isLatest = rv.version === (data.latest || (versions[0] && versions[0].version));
        html += '<div class="rn-entry' + (isLatest ? ' rn-latest' : '') + '">';
        html += '<div class="rn-hdr">';
        html += '<span class="rn-ver">' + esc(rv.version) + '</span>';
        if (isLatest) html += '<span class="rn-latest-pill">LATEST</span>';
        if (rv.date)  html += '<span class="rn-date">' + esc(rv.date) + '</span>';
        if (rv.title) html += '<span class="rn-title">— ' + esc(rv.title) + '</span>';
        html += '</div>';
        if (rv.changes && rv.changes.length) {
          html += '<div class="rn-changes">';
          rv.changes.forEach(function(c) { html += '<div class="rn-change">' + esc(c) + '</div>'; });
          html += '</div>';
        } else {
          html += '<div class="rn-no-changes">Bez detailního záznamu změn.</div>';
        }
        html += '</div>';
      });
      html += '</div>';

      if (versions.length === 0) html = '<div class="error">Žádné verze nalezeny v versions.json</div>';
      document.getElementById('content').innerHTML = html;
      if (data.updatedAt) {
        document.getElementById('footer-ts').textContent = (I18n.t('common.updated') || 'Aktualizováno') + ': ' + data.updatedAt;
      }
    }

    // ── Modals ───────────────────────────────────────────────────────────────
    window.openChangesModal = function(version) {
      var changes = _changesData[version] || [];
      document.getElementById('changesTitle').textContent = (I18n.t('vs.changes.title') || 'Změny verze') + ' ' + version;
      var html = '<div class="chg-list">';
      changes.forEach(function(c) { html += '<div class="chg-item">' + esc(c) + '</div>'; });
      if (!changes.length) html += '<div style="color:var(--muted);font-size:13px;">Žádné záznamy.</div>';
      html += '</div>';
      document.getElementById('changesBody').innerHTML = html;
      document.getElementById('changesOverlay').style.display = 'flex';
    };
    window.closeChangesModal = function() { document.getElementById('changesOverlay').style.display = 'none'; };

    window.openProtocolModal = function(url, version) {
      var overlay = document.getElementById('gprotOverlay');
      overlay.style.display = 'flex';
      document.getElementById('gprotTitle').textContent = 'Protokol archivace ' + (version || '');
      document.getElementById('gprotSub').textContent   = '';
      document.getElementById('gprotBadge').textContent = '';
      document.getElementById('gprotBadge').className   = 'gprot-badge';
      document.getElementById('gprotBody').innerHTML    = '<div class="gprot-nodata">Na\u010d\u00edt\u00e1m\u2026</div>';
      fetch(url + '?_=' + Date.now())
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(d) { renderProtocolModal(d); })
        .catch(function(e) { document.getElementById('gprotBody').innerHTML = '<div class="gprot-nodata">\u26a0\ufe0f Nelze na\u010d\u00edst protokol<br><small style="opacity:.6">' + esc(e.message) + '</small></div>'; });
    };
    window.closeProtocolModal = function() { document.getElementById('gprotOverlay').style.display = 'none'; };

    function renderProtocolModal(d) {
      var status = d.status || '?';
      var badge  = document.getElementById('gprotBadge');
      badge.textContent = status === 'OK' ? '\u2705 OK' : status === 'WARN' ? '\u26a0\ufe0f WARN' : '\u274c CHYBA';
      badge.className   = 'gprot-badge ' + (status === 'OK' ? 'gprot-badge-ok' : status === 'WARN' ? 'gprot-badge-warn' : 'gprot-badge-err');
      document.getElementById('gprotTitle').textContent = 'Protokol archivace ' + (d.version || '');
      document.getElementById('gprotSub').textContent   = (d.session || '') + (d.timestamp ? '  ·  ' + d.timestamp : '');
      var html = ''; var st = d.stats || {};
      html += '<div class="gprot-sec"><div class="gprot-sec-hdr">\ud83d\udcca Statistiky</div><div class="gprot-chips">';
      html += '<div class="gprot-chip"><span>Soubor\u016f</span>' + esc(st.totalFiles || 0) + '</div>';
      html += '<div class="gprot-chip"><span>Velikost</span>' + (st.totalSizeKb || 0) + ' kB</div>';
      if (st.previousTotal) html += '<div class="gprot-chip"><span>P\u0159edchoz\u00ed</span>' + esc(st.previousTotal) + ' soubor\u016f</div>';
      var bt = st.byType || {};
      Object.keys(bt).sort().forEach(function(ext) { html += '<div class="gprot-chip"><span>' + esc(ext) + '</span>' + esc(bt[ext]) + '</div>'; });
      html += '</div></div>';
      var vf = d.verify || {}; var checks = vf.checks || [];
      html += '<div class="gprot-sec"><div class="gprot-sec-hdr">' + (vf.failed === 0 ? '\u2705' : '\u26a0\ufe0f') + ' Verify (' + esc(vf.passed || 0) + '/' + esc((vf.passed || 0) + (vf.failed || 0)) + ' OK)</div><div class="gprot-verify">';
      checks.forEach(function(c) { html += '<div class="gprot-vi ' + (c.ok ? 'ok' : 'fail') + '">' + (c.ok ? '\u2713' : '\u2717') + ' ' + esc(c.file) + '</div>'; });
      html += '</div></div>';
      var df = d.diff || {}; var added = df.added || [], removed = df.removed || [], changed = df.changed || [];
      html += '<div class="gprot-sec"><div class="gprot-sec-hdr">\ud83d\udd04 Diff' + (df.previousSession ? ' oproti ' + esc(df.previousSession) : '') + '</div>';
      if (!added.length && !removed.length && !changed.length) { html += '<div style="font-size:12px;color:var(--muted);">Beze zm\u011bn</div>'; }
      else {
        if (added.length)   { html += '<div class="gprot-diff-lbl add">+ ' + added.length + ' p\u0159id\u00e1no</div><div class="gprot-pills">'; added.slice(0,12).forEach(function(f){html+='<span class="gprot-pill gprot-pill-a">'+esc(f)+'</span>';}); if(added.length>12)html+='<span class="gprot-pill gprot-pill-m">+'+(added.length-12)+' dal\u0161\u00edch</span>'; html+='</div>'; }
        if (removed.length) { html += '<div class="gprot-diff-lbl rem">\u2212 ' + removed.length + ' odstran\u011bno</div><div class="gprot-pills">'; removed.slice(0,12).forEach(function(f){html+='<span class="gprot-pill gprot-pill-r">'+esc(f)+'</span>';}); if(removed.length>12)html+='<span class="gprot-pill gprot-pill-m">+'+(removed.length-12)+' dal\u0161\u00edch</span>'; html+='</div>'; }
        if (changed.length) { html += '<div class="gprot-diff-lbl chg">\u007e ' + changed.length + ' zm\u011bn\u011bno</div><div class="gprot-pills">'; changed.slice(0,12).forEach(function(f){html+='<span class="gprot-pill gprot-pill-c">'+esc(f)+'</span>';}); if(changed.length>12)html+='<span class="gprot-pill gprot-pill-m">+'+(changed.length-12)+' dal\u0161\u00edch</span>'; html+='</div>'; }
      }
      html += '</div>';
      if (d.changelog) { html += '<div class="gprot-sec"><div class="gprot-sec-hdr">\ud83d\udcdd Zm\u011bny v t\u00e9to verzi</div><pre class="gprot-cl">' + esc(d.changelog) + '</pre></div>'; }
      document.getElementById('gprotBody').innerHTML = html;
    }

    // ══════════════════════════════════════════════════════════════════════════
    // WEB AUDIO — Sounds
    // ══════════════════════════════════════════════════════════════════════════
    function tone(ctx, freq, start, dur, type, vol) {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol || 0.25, ctx.currentTime + start + 0.01);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    }

    function noise(ctx, start, dur, cutoff, vol) {
      var buf  = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
      var data = buf.getChannelData(0);
      for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      var src    = ctx.createBufferSource();
      var filt   = ctx.createBiquadFilter();
      var gain   = ctx.createGain();
      src.buffer = buf;
      filt.type = 'bandpass'; filt.frequency.value = cutoff || 200;
      src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(vol || 0.3, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      src.start(ctx.currentTime + start);
    }

    // Welcome — ascending arpeggio C4→E4→G4→C5→sparkle
    function soundWelcome(ctx) {
      [[261.63,0],[329.63,.12],[392,.24],[523.25,.36]].forEach(function(n) { tone(ctx,n[0],n[1],.45,'sine',.22); });
      tone(ctx, 1046.5, .52, .55, 'sine', .12);
    }

    // Level 1 — soft ping
    function soundL1(ctx) { tone(ctx, 880, 0, .35, 'sine', .15); }

    // Level 2 — double ping
    function soundL2(ctx) { tone(ctx,660,0,.25,'sine',.2); tone(ctx,880,.22,.35,'sine',.2); }

    // Level 3 — ascending 4-note chime
    function soundL3(ctx) {
      [[523.25,0],[659.25,.14],[783.99,.28],[1046.5,.42]].forEach(function(n,i) {
        tone(ctx, n[0], n[1], i===3 ? .65 : .38, 'sine', i===3 ? .15 : .22);
      });
    }

    // Level 4 — impact boom + bright transient
    function soundL4(ctx) {
      noise(ctx, 0, .18, 200, .4);
      tone(ctx, 60,   0, .55, 'sawtooth', .35);
      tone(ctx, 80,   0, .35, 'square',   .18);
      tone(ctx, 1200, .04, .12, 'sine',   .18);
      // Rising sweep
      var osc = ctx.createOscillator(); var g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(380, ctx.currentTime + .35);
      g.gain.setValueAtTime(.28, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + .45);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + .5);
    }

    // Level 5 — epic orchestral hit
    function soundL5(ctx) {
      noise(ctx, 0, .9, 80, .35);
      tone(ctx, 55,  0, 1.1, 'sawtooth', .35);
      tone(ctx, 110, 0, 1.1, 'sine',     .25);
      [[261.63,392],[329.63,523.25],[392,659.25],[523.25,783.99]].forEach(function(pair) {
        tone(ctx, pair[0], .12, 1.1, 'sawtooth', .12);
        tone(ctx, pair[1], .12, 1.1, 'sine',     .06);
      });
      tone(ctx, 1046.5, .22, .9, 'sine', .08);
      noise(ctx, .1, .15, 500, .3);
    }

    function playSoundForLevel(ctx, lvl) {
      var fns = [null, soundL1, soundL2, soundL3, soundL4, soundL5];
      if (fns[lvl]) fns[lvl](ctx);
    }

    // ── Utils ────────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

  })();
  </script>

  <!-- Changes Modal -->
  <div class="gprot-overlay" id="changesOverlay" style="display:none" onclick="if(event.target===this)closeChangesModal()">
    <div class="gprot-modal" style="max-width:560px">
      <div class="gprot-hdr">
        <div class="gprot-hdr-main"><div class="gprot-hdr-title" id="changesTitle">Změny verze</div></div>
        <button class="gprot-close" onclick="closeChangesModal()">&#10005; Zavřít</button>
      </div>
      <div class="gprot-body" id="changesBody"></div>
    </div>
  </div>

  <!-- Protocol Modal -->
  <div class="gprot-overlay" id="gprotOverlay" style="display:none" onclick="if(event.target===this)closeProtocolModal()">
    <div class="gprot-modal">
      <div class="gprot-hdr">
        <div class="gprot-hdr-main">
          <div class="gprot-hdr-title" id="gprotTitle">Protokol archivace</div>
          <div class="gprot-hdr-sub"   id="gprotSub"></div>
        </div>
        <span class="gprot-badge" id="gprotBadge"></span>
        <button class="gprot-close" onclick="closeProtocolModal()">&#10005; Zavřít</button>
      </div>
      <div class="gprot-body" id="gprotBody"><div class="gprot-nodata">Načítám…</div></div>
    </div>
  </div>

  <script src="_hopiq.js"></script>
