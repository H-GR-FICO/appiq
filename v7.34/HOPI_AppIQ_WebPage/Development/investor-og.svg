<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8750A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#007d32" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8750A"/>
      <stop offset="100%" stop-color="#CC785C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="rgba(232,117,10,0.06)"/>
  <circle cx="100" cy="560" r="180" fill="rgba(0,125,50,0.05)"/>
  <circle cx="600" cy="315" r="400" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#bar)"/>

  <!-- Left green bar (brand element) -->
  <rect x="60" y="80" width="5" height="120" fill="#007d32"/>

  <!-- HOPI AppIQ Logo text -->
  <text x="80" y="148" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-1">HOPI</text>
  <text x="248" y="148" font-family="'Segoe UI',Arial,sans-serif" font-size="66" font-weight="300" fill="#E8750A">App</text>
  <text x="362" y="148" font-family="'Segoe UI',Arial,sans-serif" font-size="66" font-weight="900" fill="#007d32">IQ</text>

  <!-- Divider line -->
  <line x1="60" y1="168" x2="580" y2="168" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- INVESTOR BRIEF label -->
  <text x="60" y="210" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="rgba(232,117,10,0.8)" letter-spacing="4">INVESTOR BRIEF · DŮVĚRNÝ DOKUMENT</text>

  <!-- Main headline -->
  <text x="60" y="285" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="700" fill="#ffffff">Investment Readiness</text>
  <text x="60" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="300" fill="rgba(255,255,255,0.6)">HOPI TechIQ s.r.o.</text>

  <!-- Subtitle -->
  <text x="60" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.4)">AI-powered Enterprise Platform · Phase 1 Active · CEE → WorldWide</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="60" y="430" width="160" height="80" rx="8" fill="rgba(232,117,10,0.08)" stroke="rgba(232,117,10,0.2)" stroke-width="1"/>
  <text x="140" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="800" fill="#E8750A" text-anchor="middle">8 týdnů</text>
  <text x="140" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">DO LIVE DEPLOYMENTU</text>

  <!-- Stat 2 -->
  <rect x="240" y="430" width="160" height="80" rx="8" fill="rgba(232,117,10,0.08)" stroke="rgba(232,117,10,0.2)" stroke-width="1"/>
  <text x="320" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="800" fill="#E8750A" text-anchor="middle">~$1k</text>
  <text x="320" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">CELKOVÉ NÁKLADY</text>

  <!-- Stat 3 -->
  <rect x="420" y="430" width="160" height="80" rx="8" fill="rgba(0,125,50,0.08)" stroke="rgba(29,185,84,0.2)" stroke-width="1"/>
  <text x="500" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="800" fill="#1DB954" text-anchor="middle">109</text>
  <text x="500" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">GIT COMMITS</text>

  <!-- Stat 4 -->
  <rect x="600" y="430" width="160" height="80" rx="8" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="680" y="465" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="800" fill="#A855F7" text-anchor="middle">LIVE</text>
  <text x="680" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">V PRODUKCI</text>

  <!-- Right side — brand badge -->
  <rect x="820" y="200" width="320" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="980" y="250" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">HOPI TECHNOLOGY</text>
  <text x="980" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">AppIQ Platform</text>
  <text x="980" y="340" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="300" fill="rgba(255,255,255,0.4)" text-anchor="middle">AI · Enterprise · SaaS</text>

  <line x1="880" y1="360" x2="1080" y2="360" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="980" y="390" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(204,120,92,0.7)" text-anchor="middle" letter-spacing="1">powered by</text>
  <text x="980" y="415" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#CC785C" text-anchor="middle">Claude · Anthropic</text>
  <text x="980" y="438" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">ZÁMĚR PARTNERSTVÍ · 2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.4)"/>
  <text x="60" y="621" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">HOPI TechIQ s.r.o. · Confidential · 2026</text>
  <text x="1140" y="621" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="end">HOPI AppIQ · v7.22</text>
</svg>
