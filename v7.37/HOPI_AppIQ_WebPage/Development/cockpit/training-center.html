<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Training Center — MNG Cockpit · HOPI AppIQ</title>
  <link rel="stylesheet" href="_cockpit.css"/>
  <style>

    /* ── CSS variable alias — _cockpit.css uses --c-muted, not --c-text-muted ── */
    :root { --c-text-muted: var(--c-muted); }

    /* ── Training Center — full-viewport slide layout ── */
    /* Body becomes flex column so tc-main fills remaining height
       regardless of actual shell height (topbar + hero + mottos ≈ 134px) */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #cockpit-shell { flex-shrink: 0; }

    .tc-main {
      flex: 1;
      min-height: 0;        /* required for flex children to shrink */
      display: flex;
      flex-direction: column;
      padding: 0 !important;
      max-width: none !important;
      overflow: hidden;
    }

    /* ── Stage ─────────────────────────────────────────────────────────── */
    .tc-stage {
      flex: 1;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      position: relative;
    }

    .tc-slide {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 48px 16px;
      overflow-y: auto;
      animation: tcFadeIn .25s ease;
    }
    @keyframes tcFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Chapter badge ──────────────────────────────────────────────────── */
    .tc-chapter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .tc-chapter-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--c-font-sans);
    }
    .tc-chapter-badge.foundation { background: rgba(168,85,247,.18); color: #A855F7; }
    .tc-chapter-badge.practice   { background: rgba(59,130,246,.18);  color: #3B82F6; }
    .tc-chapter-badge.expert     { background: rgba(245,158,11,.18);  color: #F59E0B; }
    .tc-chapter-badge.domain     { background: rgba(16,185,129,.18);  color: #10B981; }
    .tc-chapter-badge.intro      { background: rgba(255,255,255,.08); color: var(--c-text-muted); }

    .tc-slide-id {
      font-size: 11px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      font-weight: 600;
      letter-spacing: .5px;
    }

    /* ── Slide title ────────────────────────────────────────────────────── */
    .tc-title {
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 700;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      line-height: 1.2;
      margin: 6px 0 4px;
    }
    .tc-title .accent { color: var(--c-violet); }

    .tc-subtitle {
      font-size: 15px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      margin-bottom: 20px;
    }

    /* ── Content blocks ─────────────────────────────────────────────────── */
    .tc-body { flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .tc-cols { display: grid; gap: 16px; }
    .tc-cols-2 { grid-template-columns: 1fr 1fr; }
    .tc-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .tc-cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    .tc-card {
      background: var(--c-bg2);
      border: 1px solid var(--c-border);
      border-radius: var(--c-radius);
      padding: 16px 18px;
    }
    .tc-card.highlight { border-color: var(--c-violet); background: rgba(168,85,247,.07); }
    .tc-card.green     { border-color: #10B981; background: rgba(16,185,129,.07); }
    .tc-card.amber     { border-color: #F59E0B; background: rgba(245,158,11,.07); }
    .tc-card.blue      { border-color: #3B82F6; background: rgba(59,130,246,.07); }
    .tc-card.muted     { opacity: .55; }

    .tc-card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 6px;
      font-family: var(--c-font-sans);
    }
    .tc-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      margin-bottom: 6px;
    }
    .tc-card-text {
      font-size: 13px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      line-height: 1.5;
    }
    .tc-card-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 8px;
      font-family: var(--c-font-sans);
    }
    .tag-done    { background: rgba(16,185,129,.2); color: #10B981; }
    .tag-dev     { background: rgba(168,85,247,.2); color: #A855F7; }
    .tag-soon    { background: rgba(255,255,255,.08); color: var(--c-text-muted); }
    .tag-best    { background: rgba(16,185,129,.2); color: #10B981; }
    .tag-risk    { background: rgba(239,68,68,.2); color: #EF4444; }
    .tag-default { background: rgba(245,158,11,.2); color: #F59E0B; }

    .tc-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 7px; }
    .tc-list li {
      display: flex;
      gap: 10px;
      font-size: 14px;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      line-height: 1.4;
    }
    .tc-list li::before { content: '→'; color: var(--c-violet); flex-shrink: 0; font-weight: 700; }
    .tc-list li.muted::before { color: var(--c-text-muted); }
    .tc-list li.muted { color: var(--c-text-muted); }

    .tc-insight {
      background: rgba(168,85,247,.1);
      border-left: 3px solid var(--c-violet);
      border-radius: 0 var(--c-radius-sm) var(--c-radius-sm) 0;
      padding: 12px 16px;
      font-size: 14px;
      font-style: italic;
      color: var(--c-text);
      font-family: var(--c-font-sans);
      line-height: 1.5;
    }
    .tc-insight.green  { background: rgba(16,185,129,.1);  border-color: #10B981; }
    .tc-insight.amber  { background: rgba(245,158,11,.1);  border-color: #F59E0B; }
    .tc-insight.blue   { background: rgba(59,130,246,.1);  border-color: #3B82F6; }

    .tc-big-number {
      font-size: 42px;
      font-weight: 800;
      color: var(--c-violet);
      font-family: var(--c-font-sans);
      line-height: 1;
    }
    .tc-big-label {
      font-size: 12px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      margin-top: 4px;
    }

    /* Stack layer item */
    .tc-layer {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      border-radius: var(--c-radius-sm);
      background: var(--c-bg2);
      border: 1px solid var(--c-border);
    }
    .tc-layer.our   { border-color: var(--c-violet); background: rgba(168,85,247,.09); }
    .tc-layer-num   { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; font-family: var(--c-font-sans); }
    .tc-layer-name  { font-size: 14px; font-weight: 700; color: var(--c-text); font-family: var(--c-font-sans); min-width: 140px; }
    .tc-layer-exa   { font-size: 12px; color: var(--c-text-muted); font-family: var(--c-font-sans); }

    /* Placeholder slide */
    .tc-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      opacity: .7;
    }
    .tc-ph-icon { font-size: 40px; }
    .tc-ph-title { font-size: 20px; font-weight: 700; color: var(--c-text); font-family: var(--c-font-sans); }
    .tc-ph-desc  { font-size: 14px; color: var(--c-text-muted); font-family: var(--c-font-sans); max-width: 360px; line-height: 1.5; }
    .tc-ph-tag   { font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 4px 14px; border-radius: 20px; font-family: var(--c-font-sans); }

    /* ── Bottom navigation ──────────────────────────────────────────────── */
    .tc-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 48px 14px;
      border-top: 1px solid var(--c-border);
      gap: 16px;
      background: var(--c-bg);
      flex-shrink: 0;
    }

    .tc-nav-btn {
      background: var(--c-bg2);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      border-radius: var(--c-radius-sm);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      font-family: var(--c-font-sans);
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    .tc-nav-btn:hover:not(:disabled) { background: var(--c-violet); border-color: var(--c-violet); color: #fff; }
    .tc-nav-btn:disabled { opacity: .3; cursor: default; }

    .tc-dots {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      flex: 1;
    }
    .tc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--c-border);
      cursor: pointer;
      transition: background .2s, transform .2s;
      flex-shrink: 0;
    }
    .tc-dot.active { background: var(--c-violet); transform: scale(1.35); }
    .tc-dot.foundation { --dot-c: #A855F7; }
    .tc-dot.practice   { --dot-c: #3B82F6; }
    .tc-dot.expert     { --dot-c: #F59E0B; }
    .tc-dot.domain     { --dot-c: #10B981; }
    .tc-dot.active { background: var(--dot-c, var(--c-violet)); }

    .tc-counter {
      font-size: 12px;
      color: var(--c-text-muted);
      font-family: var(--c-font-sans);
      font-weight: 600;
      min-width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    .tc-fullscreen-btn {
      background: transparent;
      border: 1px solid var(--c-border);
      color: var(--c-text-muted);
      border-radius: var(--c-radius-sm);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .tc-fullscreen-btn:hover { border-color: var(--c-violet); color: var(--c-violet); }

    /* ── Speaker Notes panel ────────────────────────────────────────────── */
    .tc-notes-panel {
      display: none;
      background: rgba(168,85,247,.06);
      border-top: 1px solid rgba(168,85,247,.22);
      padding: 8px 48px;
      flex-shrink: 0;
      max-height: 72px;
      overflow-y: auto;
    }
    .tc-notes-panel.tc-notes-visible { display: block; }
    .tc-notes-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-wrap: wrap; gap: 4px 28px;
    }
    .tc-notes-item {
      font-size: 12px; color: var(--c-text); font-family: var(--c-font-sans);
      line-height: 1.4; display: flex; gap: 6px; align-items: baseline;
    }
    .tc-notes-item::before { content: '▶'; color: var(--c-violet); font-size: 9px; flex-shrink: 0; }
    .tc-notes-btn {
      background: transparent;
      border: 1px solid var(--c-border);
      color: var(--c-text-muted);
      border-radius: var(--c-radius-sm);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: var(--c-font-sans); letter-spacing: .5px;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .tc-notes-btn:hover    { border-color: var(--c-violet); color: var(--c-violet); }
    .tc-notes-btn.active   { border-color: var(--c-violet); color: var(--c-violet); background: rgba(168,85,247,.1); }
    .tc-notes-tabs { display:flex; gap:0; padding-bottom:4px; border-bottom:1px solid rgba(168,85,247,.18); margin-bottom:6px; flex-shrink:0; }
    .tc-notes-tab  { background:transparent; border:none; border-bottom:2px solid transparent; padding:2px 12px 5px; font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--c-text-muted); font-family:var(--c-font-sans); cursor:pointer; transition:color .15s,border-color .15s; margin-bottom:-1px; }
    .tc-notes-tab.active { color:var(--c-violet); border-bottom-color:var(--c-violet); }
    .tc-notes-tab:hover   { color:var(--c-violet); }
    .tc-notes-script { font-size:13px; color:var(--c-text); font-family:var(--c-font-sans); line-height:1.6; overflow-y:auto; }
    .tc-notes-script p { margin:0 0 4px 0; }
    .tc-sc-story { color:#10B981; font-style:italic; }
    .tc-sc-q     { color:var(--c-violet); font-style:italic; }
    .tc-notes-hidden  { display:none !important; }
    .tc-notes-panel.script-mode { max-height:190px; }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .tc-slide   { padding: 18px 20px 12px; }
      .tc-nav     { padding: 8px 20px 10px; }
      .tc-cols-2, .tc-cols-3, .tc-cols-4 { grid-template-columns: 1fr; }
      .tc-title   { font-size: 20px; }
      .tc-notes-panel { padding: 6px 20px; }
      .tc-notes-btn   { display: none; }
    }

    /* ── PDF Export dropdown ────────────────────────────────────────────── */
    .tc-pdf-wrap { position: relative; flex-shrink: 0; }
    .tc-pdf-menu {
      position: absolute; bottom: calc(100% + 8px); right: 0;
      background: var(--c-bg2); border: 1px solid var(--c-border);
      border-radius: 10px; padding: 6px; min-width: 224px;
      display: none; flex-direction: column; gap: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,.35); z-index: 200;
    }
    .tc-pdf-menu.open { display: flex; }
    .tc-pdf-opt {
      background: transparent; border: none; border-radius: 7px;
      padding: 8px 12px; color: var(--c-text);
      font-family: var(--c-font-sans); font-size: 13px; font-weight: 600;
      text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 2px;
      transition: background .15s;
    }
    .tc-pdf-opt:hover { background: rgba(168,85,247,.12); }
    .tc-pdf-opt span  { font-size: 10px; font-weight: 400; color: var(--c-text-muted); }
    #tc-print-container { display: none; }

    /* ── Slide Selection Modal ──────────────────────────────────────────────── */
    .tc-sel-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 9000; display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .tc-sel-modal.open { display: flex; }
    .tc-sel-box {
      background: var(--c-bg2); border: 1px solid var(--c-border);
      border-radius: 14px; width: 100%; max-width: 540px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5); display: flex; flex-direction: column;
      max-height: 90vh;
    }
    .tc-sel-head {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 12px; border-bottom: 1px solid var(--c-border); flex-shrink: 0;
    }
    .tc-sel-title { font-size: 14px; font-weight: 700; color: var(--c-text); flex: 1; }
    .tc-sel-all, .tc-sel-none {
      background: transparent; border: 1px solid var(--c-border); border-radius: 6px;
      padding: 3px 9px; font-size: 11px; color: var(--c-text-muted);
      font-family: var(--c-font-sans); cursor: pointer; transition: all .15s;
    }
    .tc-sel-all:hover  { border-color: var(--c-violet); color: var(--c-violet); }
    .tc-sel-none:hover { border-color: #ef4444; color: #ef4444; }
    .tc-sel-close {
      background: transparent; border: none; font-size: 16px; line-height: 1;
      color: var(--c-text-muted); cursor: pointer; padding: 4px 6px; border-radius: 6px;
      transition: background .15s; margin-left: 4px;
    }
    .tc-sel-close:hover { background: rgba(239,68,68,.12); color: #ef4444; }
    .tc-sel-list {
      overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column;
      gap: 1px; flex: 1; min-height: 0; max-height: 380px;
    }
    .tc-sel-group {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--c-text-muted); padding: 8px 4px 3px;
    }
    .tc-sel-group:first-child { padding-top: 2px; }
    .tc-sel-item {
      display: flex; align-items: center; gap: 10px; padding: 5px 8px;
      border-radius: 7px; cursor: pointer; transition: background .12s;
    }
    .tc-sel-item:hover { background: rgba(168,85,247,.08); }
    .tc-sel-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--c-violet); cursor: pointer; flex-shrink: 0; }
    .tc-sel-item.expert input[type="checkbox"] { accent-color: #F59E0B; }
    .tc-sel-id  { font-size: 10px; font-weight: 700; color: var(--c-text-muted); min-width: 34px; }
    .tc-sel-item.expert .tc-sel-id { color: #F59E0B; }
    .tc-sel-lbl { font-size: 12px; color: var(--c-text); line-height: 1.35; }
    .tc-sel-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-top: 1px solid var(--c-border); flex-shrink: 0;
    }
    .tc-sel-count { font-size: 11px; color: var(--c-text-muted); }
    .tc-sel-export {
      background: var(--c-violet); border: none; border-radius: 8px;
      padding: 8px 20px; color: #fff; font-size: 13px; font-weight: 700;
      font-family: var(--c-font-sans); cursor: pointer; transition: opacity .15s;
    }
    .tc-sel-export:hover  { opacity: .85; }
    .tc-sel-export:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Presentation Filter Button ─────────────────────────────────────── */
    .tc-filter-btn {
      background: transparent; border: 1px solid transparent; border-radius: 7px;
      padding: 5px 8px; color: var(--c-text-muted); font-size: 15px; line-height: 1;
      font-family: var(--c-font-sans); cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .tc-filter-btn:hover { background: rgba(168,85,247,.1); color: var(--c-violet); border-color: rgba(168,85,247,.3); }
    .tc-filter-btn.active { color: #F59E0B; border-color: rgba(245,158,11,.4); background: rgba(245,158,11,.08); }

    /* ── @media print ───────────────────────────────────────────────────── */
    @media print {
      :root {
        --c-bg: #fff; --c-bg2: #f5f5f5; --c-bg3: #ebebeb;
        --c-text: #111; --c-text-muted: #555; --c-border: #ddd; --c-violet: #7C3AED;
      }
      #cockpit-shell, .tc-nav, .tc-notes-panel { display: none !important; }
      .tc-main  { height: auto !important; overflow: visible !important; display: block !important; }
      .tc-stage { display: none !important; }
      #tc-print-container { display: block !important; }
      .tc-print-slide {
        page-break-after: always; break-after: page;
        overflow: hidden; background: #fff; padding: 0;
      }
      .tc-print-slide:last-child { page-break-after: avoid; break-after: avoid; }
      .tc-print-header { padding-bottom: 8px; border-bottom: 2px solid #7C3AED; margin-bottom: 10px; }
      .tc-print-chapter { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #7C3AED; margin-bottom: 2px; font-family: 'Segoe UI', sans-serif; }
      .tc-print-title   { font-size: 22px; font-weight: 800; color: #111; margin: 0 0 2px; line-height: 1.2; font-family: 'Segoe UI', sans-serif; }
      .tc-print-title .accent { color: #7C3AED; }
      .tc-print-subtitle { font-size: 12px; color: #555; margin: 0; font-family: 'Segoe UI', sans-serif; }
      .tc-print-notes-section { margin-top: 10px; padding-top: 8px; border-top: 1px solid #ddd; }
      .tc-print-notes-section h4 { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #7C3AED; margin: 0 0 4px; font-family: 'Segoe UI', sans-serif; }
      .tc-print-notes-section ul { margin: 0; padding-left: 16px; }
      .tc-print-notes-section li, .tc-print-notes-section p { font-size: 10px; color: #333; margin-bottom: 2px; font-family: 'Segoe UI', sans-serif; line-height: 1.4; }
      .tc-print-notes-section p { margin: 2px 0; }
      body.tc-print-pres .tc-print-slide { min-height: calc(100vh - 24mm); display: flex; flex-direction: column; }
      body.tc-print-pres .tc-print-slide .tc-body { flex: 1; }
      body.tc-print-pres .tc-print-notes-section { display: none; }
    }
  </style>
</head>
<body>

  <div id="cockpit-shell"></div>

  <main class="cockpit-page tc-main">

    <div class="tc-stage">
      <div class="tc-slide" id="tc-slide"><!-- JS injected --></div>
    </div>

    <div class="tc-notes-panel" id="tc-notes">
      <div class="tc-notes-tabs">
        <button class="tc-notes-tab active" id="tc-tab-bullets">KLÍČOVÉ BODY</button>
        <button class="tc-notes-tab"        id="tc-tab-script">PROJEV</button>

  /* ─────────────────────────────────────────────────────────────────────
     SLIDE ENGINE
  ───────────────────────────────────────────────────────────────────── */
  let cur = 0;
  let _viewSlides = null;
  function activeSlides() { return _viewSlides || SLIDES; }
  let notesVisible = false;
  let notesTab = 'bullets';

  function switchNotesTab(tab) {
    notesTab = tab;
    document.getElementById('tc-tab-bullets').classList.toggle('active', tab === 'bullets');
    document.getElementById('tc-tab-script').classList.toggle('active', tab === 'script');
    document.getElementById('tc-notes-list').classList.toggle('tc-notes-hidden', tab === 'script');
    document.getElementById('tc-notes-script').classList.toggle('tc-notes-hidden', tab === 'bullets');
    document.getElementById('tc-notes').classList.toggle('script-mode', tab === 'script');
  }

  function toggleNotes() {
    notesVisible = !notesVisible;
    document.getElementById('tc-notes').classList.toggle('tc-notes-visible', notesVisible);
    document.getElementById('tc-notes-btn').classList.toggle('active', notesVisible);
  }

  function renderSlide() {
    const s   = activeSlides()[cur];
    const el  = document.getElementById('tc-slide');
    const lang = document.documentElement.lang || 'cs';

    let innerHtml = '';

    // Chapter + ID row
    innerHtml += `<div class="tc-chapter-row">
      <span class="tc-chapter-badge ${s.chapter}">${s.chapterLabel}</span>
      <span class="tc-slide-id">${s.id}</span>
    </div>`;

    // Title + subtitle
    innerHtml += `<div class="tc-title">${s.title}</div>`;
    if (s.subtitle) innerHtml += `<div class="tc-subtitle">${s.subtitle}</div>`;

    // Content
    if (s.placeholder) {
      innerHtml += `<div class="tc-placeholder">
        <div class="tc-ph-icon">${s.phIcon}</div>
        <div class="tc-ph-title">${s.id} — ${s.phDesc ? '' : s.title.replace(/<[^>]+>/g,'')}</div>
        <div class="tc-ph-desc">${s.phDesc || ''}</div>
        <span class="tc-ph-tag ${s.phTagClass}" style="background:rgba(168,85,247,.15);color:var(--c-violet)">${s.phTag}</span>
      </div>`;
    } else {
      innerHtml += s.html || '';
    }

    el.innerHTML = innerHtml;
    el.scrollTop = 0;

    // Notes panel
    const notesList = document.getElementById('tc-notes-list');
    if (notesList) {
      const items = NOTES[s.id] || [];
      notesList.innerHTML = items.map(n => `<li class="tc-notes-item">${n}</li>`).join('');
    }
    // Populate script (2nd layer)
    const scriptEl = document.getElementById('tc-notes-script');
    if (scriptEl) {
      const lines = SCRIPT[s.id] || [];
      scriptEl.innerHTML = lines.map(line => {
        const isStory = line.startsWith('🗣');
        const isQ    = line.startsWith('❓');
        const cls    = isStory ? 'tc-sc-story' : isQ ? 'tc-sc-q' : '';
        return `<p class="${cls}">${line}</p>`;
      }).join('');
    }

    // Dots
    document.querySelectorAll('.tc-dot').forEach((d, i) => {
      d.classList.toggle('active', i === cur);
    });

    // Buttons
    document.getElementById('tc-prev').disabled = cur === 0;
    document.getElementById('tc-next').disabled = cur === activeSlides().length - 1;

    // Counter
    const vs = activeSlides();
    document.getElementById('tc-counter').textContent = `${cur + 1} / ${vs.length}`;

    // Filter button state
    const fbtn = document.getElementById('tc-filter-btn');
    fbtn.classList.toggle('active', !!_viewSlides && _viewSlides.length < SLIDES.length);
    fbtn.title = _viewSlides && _viewSlides.length < SLIDES.length
      ? `Filtr aktivní: ${_viewSlides.length}/${SLIDES.length} slidů (S)`
      : 'Filtr slidů (S)';
  }

  function buildDots() {
    const wrap = document.getElementById('tc-dots');
    wrap.innerHTML = '';
    activeSlides().forEach((s, i) => {
      const d = document.createElement('div');
      d.className = `tc-dot ${s.chapter}`;
      d.title = `${s.id}`;
      d.addEventListener('click', () => { cur = i; renderSlide(); });
      wrap.appendChild(d);
    });
  }

  function goTo(i) {
    if (i < 0 || i >= activeSlides().length) return;
    cur = i;
    renderSlide();
  }

  // ── Presentation Filter ──────────────────────────────────────────────────
  function openFilterModal() {
    const list = document.getElementById('tc-filt-list');
    list.innerHTML = '';
    const currentIds = (_viewSlides || SLIDES).map(s => s.id);
    const groups = {};
    const groupOrder = [];
    SLIDES.forEach(s => {
      const g = s.chapterLabel || 'Obecné';
      if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
      groups[g].push(s);
    });
    groupOrder.forEach(gName => {
      const grpEl = document.createElement('div');
      grpEl.className = 'tc-sel-group';
      grpEl.textContent = gName;
      list.appendChild(grpEl);
      groups[gName].forEach(s => {
        const label = document.createElement('label');
        label.className = 'tc-sel-item' + (s.chapter === 'expert' ? ' expert' : '');
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.value = s.id; cb.checked = currentIds.includes(s.id);
        cb.addEventListener('change', updateFiltCount);
        const idSpan = document.createElement('span');
        idSpan.className = 'tc-sel-id'; idSpan.textContent = s.id;
        const lblSpan = document.createElement('span');
        lblSpan.className = 'tc-sel-lbl';
        lblSpan.textContent = s.title.replace(/<[^>]+>/g, '');
        label.appendChild(cb); label.appendChild(idSpan); label.appendChild(lblSpan);
        list.appendChild(label);
      });
    });
    updateFiltCount();
    document.getElementById('tc-filt-modal').classList.add('open');
  }

  function closeFilterModal() {
    document.getElementById('tc-filt-modal').classList.remove('open');
  }

  function updateFiltCount() {
    const total   = document.querySelectorAll('#tc-filt-list input[type="checkbox"]').length;
    const checked = document.querySelectorAll('#tc-filt-list input[type="checkbox"]:checked').length;
    document.getElementById('tc-filt-count').textContent = checked + ' / ' + total + ' slidů';
    document.getElementById('tc-filt-apply').disabled = checked === 0;
  }

  document.getElementById('tc-filt-all').addEventListener('click', () => {
    document.querySelectorAll('#tc-filt-list input[type="checkbox"]').forEach(cb => cb.checked = true);
    updateFiltCount();
  });
  document.getElementById('tc-filt-none').addEventListener('click', () => {
    document.querySelectorAll('#tc-filt-list input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateFiltCount();
  });
  document.getElementById('tc-filt-close').addEventListener('click', closeFilterModal);
  document.getElementById('tc-filt-apply').addEventListener('click', () => {
    const ids = [...document.querySelectorAll('#tc-filt-list input[type="checkbox"]:checked')].map(cb => cb.value);
    _viewSlides = ids.length === SLIDES.length ? null : SLIDES.filter(s => ids.includes(s.id));
    cur = 0;
    closeFilterModal();
    buildDots();
    renderSlide();
  });
  document.getElementById('tc-filt-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('tc-filt-modal')) closeFilterModal();
  });
  document.getElementById('tc-filter-btn').addEventListener('click', openFilterModal);

  // Nav buttons
  document.getElementById('tc-prev').addEventListener('click', () => goTo(cur - 1));
  document.getElementById('tc-next').addEventListener('click', () => goTo(cur + 1));

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(cur + 1); }
    if (e.key === 'ArrowLeft')                   { e.preventDefault(); goTo(cur - 1); }
    if (e.key === 'f' || e.key === 'F')          { toggleFullscreen(); }
    if (e.key === 'n' || e.key === 'N')          { toggleNotes(); }
    if (e.key === 'p' || e.key === 'P')          { e.preventDefault(); if (!document.getElementById('tc-sel-modal').classList.contains('open') && !document.getElementById('tc-filt-modal').classList.contains('open')) openPrintMenu(); }
    if (e.key === 's' || e.key === 'S')          { e.preventDefault(); if (!document.getElementById('tc-sel-modal').classList.contains('open') && !document.getElementById('tc-filt-modal').classList.contains('open')) openFilterModal(); }
  });

  // Notes button
  document.getElementById('tc-notes-btn').addEventListener('click', toggleNotes);

  // Notes tab switchers
  document.getElementById('tc-tab-bullets').addEventListener('click', () => switchNotesTab('bullets'));
  document.getElementById('tc-tab-script').addEventListener('click',  () => switchNotesTab('script'));

  // Fullscreen
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }
  document.getElementById('tc-fs').addEventListener('click', toggleFullscreen);

  // PDF Export
  function openPrintMenu() {
    document.getElementById('tc-pdf-menu').classList.toggle('open');
  }
  document.getElementById('tc-pdf-btn').addEventListener('click', e => {
    e.stopPropagation();
    openPrintMenu();
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#tc-pdf-wrap')) {
      document.getElementById('tc-pdf-menu').classList.remove('open');
    }
  });
  document.querySelectorAll('.tc-pdf-opt').forEach(btn => {
    btn.addEventListener('click', () => openSelModal(btn.dataset.mode));
  });

  let _tcPrintMode = 'pres';

  function openSelModal(mode) {
    _tcPrintMode = mode;
    document.getElementById('tc-pdf-menu').classList.remove('open');
    const list = document.getElementById('tc-sel-list');
    list.innerHTML = '';
    const groups = {};
    const groupOrder = [];
    SLIDES.forEach(s => {
      const g = s.chapterLabel || 'Obecné';
      if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
      groups[g].push(s);
    });
    groupOrder.forEach(gName => {
      const grpEl = document.createElement('div');
      grpEl.className = 'tc-sel-group';
      grpEl.textContent = gName;
      list.appendChild(grpEl);
      groups[gName].forEach(s => {
        const label = document.createElement('label');
        label.className = 'tc-sel-item' + (s.chapter === 'expert' ? ' expert' : '');
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.value = s.id; cb.checked = true;
        cb.addEventListener('change', updateSelCount);
        const idSpan = document.createElement('span');
        idSpan.className = 'tc-sel-id'; idSpan.textContent = s.id;
        const lblSpan = document.createElement('span');
        lblSpan.className = 'tc-sel-lbl';
        lblSpan.textContent = s.title.replace(/<[^>]+>/g, '');
        label.appendChild(cb); label.appendChild(idSpan); label.appendChild(lblSpan);
        list.appendChild(label);
      });
    });
    updateSelCount();
    document.getElementById('tc-sel-modal').classList.add('open');
  }

  function closeSelModal() {
    document.getElementById('tc-sel-modal').classList.remove('open');
  }

  function updateSelCount() {
    const total   = document.querySelectorAll('#tc-sel-list input[type="checkbox"]').length;
    const checked = document.querySelectorAll('#tc-sel-list input[type="checkbox"]:checked').length;
    document.getElementById('tc-sel-count').textContent = checked + ' / ' + total + ' slidů vybráno';
    document.getElementById('tc-sel-export').disabled = checked === 0;
  }

  document.getElementById('tc-sel-all').addEventListener('click', () => {
    document.querySelectorAll('#tc-sel-list input[type="checkbox"]').forEach(cb => cb.checked = true);
    updateSelCount();
  });
  document.getElementById('tc-sel-none').addEventListener('click', () => {
    document.querySelectorAll('#tc-sel-list input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateSelCount();
  });
  document.getElementById('tc-sel-close').addEventListener('click', closeSelModal);
  document.getElementById('tc-sel-export').addEventListener('click', () => {
    const ids = [...document.querySelectorAll('#tc-sel-list input[type="checkbox"]:checked')].map(cb => cb.value);
    closeSelModal();
    exportPDF(_tcPrintMode, ids);
  });
  document.getElementById('tc-sel-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('tc-sel-modal')) closeSelModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('tc-sel-modal').classList.contains('open'))  { e.preventDefault(); closeSelModal(); }
      if (document.getElementById('tc-filt-modal').classList.contains('open')) { e.preventDefault(); closeFilterModal(); }
    }
  });

  function exportPDF(mode, selectedIds) {
    const slides = selectedIds ? SLIDES.filter(s => selectedIds.includes(s.id)) : SLIDES;
    const container = document.getElementById('tc-print-container');
    container.innerHTML = '';
    slides.forEach(s => {
      const div = document.createElement('div');
      div.className = 'tc-print-slide';
      let html = `<div class="tc-print-header">
        <div class="tc-print-chapter">${s.chapterLabel}</div>
        <h2 class="tc-print-title">${s.title}</h2>
        ${s.subtitle ? `<p class="tc-print-subtitle">${s.subtitle}</p>` : ''}
      </div>`;
      html += s.placeholder
        ? `<div class="tc-placeholder">
             <div class="tc-ph-icon">${s.phIcon || '🔜'}</div>
             <div class="tc-ph-title">${s.id} — ${s.title.replace(/<[^>]+>/g,'')}</div>
             <span class="tc-ph-tag ${s.phTagClass||''}">${s.phTag||'Připravujeme'}</span>
           </div>`
        : (s.html || '');
      if (mode === 'full') {
        const bullets = NOTES[s.id] || [];
        const script  = SCRIPT[s.id] || [];
        if (bullets.length)
          html += `<div class="tc-print-notes-section"><h4>Klíčové body</h4><ul>${bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div>`;
        if (script.length)
          html += `<div class="tc-print-notes-section"><h4>Projev prezentátora</h4>${script.map(l=>`<p>${l}</p>`).join('')}</div>`;
      }
      div.innerHTML = html;
      container.appendChild(div);
    });
    const ps = document.createElement('style');
    ps.id = 'tc-ps';
    ps.textContent = mode === 'pres'
      ? '@page { size: A4 landscape; margin: 10mm 12mm; }'
      : '@page { size: A4 portrait; margin: 12mm 15mm; }';
    document.head.appendChild(ps);
    document.body.classList.add(mode === 'pres' ? 'tc-print-pres' : 'tc-print-full');
    window.print();
    document.body.classList.remove('tc-print-pres', 'tc-print-full');
    container.innerHTML = '';
    const old = document.getElementById('tc-ps');
    if (old) old.remove();
  }

  // Touch/swipe
  let _tx = null;
  document.getElementById('tc-stage').addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
  document.getElementById('tc-stage').addEventListener('touchend',   e => {
    if (_tx === null) return;
    const dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 40) goTo(cur + (dx < 0 ? 1 : -1));
    _tx = null;
  });

  // Lang change (shell event)
  document.addEventListener('appiq:langchange', renderSlide);

  // Init
  buildDots();
  renderSlide();

  </script>
</body>
</html>
