<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg,#05060F 0%,#0A0818 50%,#05060F 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:80px 80px;
}
.glow{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,.12) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.star{position:absolute;border-radius:50%;background:#fff;}
.lock{
  width:96px;height:96px;background:rgba(168,85,247,.12);
  border:2px solid rgba(168,85,247,.4);border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;margin-bottom:32px;position:relative;z-index:2;
}
.eyebrow{
  font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  color:rgba(168,85,247,.7);margin-bottom:16px;position:relative;z-index:2;
}
.headline{
  font-size:64px;font-weight:900;letter-spacing:-2px;line-height:1;
  color:#fff;margin-bottom:16px;position:relative;z-index:2;text-align:center;
}
.headline span{
  color:transparent;
  background:linear-gradient(135deg,#A855F7,#E8750A);
  -webkit-background-clip:text;background-clip:text;
}
.sub{
  font-size:16px;color:rgba(255,255,255,.38);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:40px;position:relative;z-index:2;
}
.pills{display:flex;gap:12px;position:relative;z-index:2;}
.pill{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 16px;border-radius:20px;border:1px solid;
}
.pill-vi{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.35);color:rgba(192,132,252,.9);}
.pill-or{background:rgba(232,117,10,.12);border-color:rgba(232,117,10,.35);color:rgba(232,117,10,.9);}
.pill-gr{background:rgba(29,185,84,.1);border-color:rgba(29,185,84,.3);color:rgba(80,200,110,.9);}
.domain{
  position:absolute;bottom:28px;font-size:11px;color:rgba(255,255,255,.2);
  letter-spacing:2px;text-transform:uppercase;z-index:2;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="star" style="width:2px;height:2px;top:12%;left:18%;opacity:.5;"></div>
<div class="star" style="width:1.5px;height:1.5px;top:25%;left:75%;opacity:.4;"></div>
<div class="star" style="width:3px;height:3px;top:8%;left:55%;opacity:.3;"></div>
<div class="star" style="width:1px;height:1px;top:70%;left:22%;opacity:.5;"></div>
<div class="star" style="width:2px;height:2px;top:80%;left:82%;opacity:.4;"></div>
<div class="star" style="width:1.5px;height:1.5px;top:45%;left:8%;opacity:.35;"></div>
<div class="star" style="width:2px;height:2px;top:15%;left:88%;opacity:.4;"></div>
<div class="star" style="width:1px;height:1px;top:60%;left:92%;opacity:.5;"></div>

<div class="lock">🔒</div>
<div class="eyebrow">HOPI TechIQ s.r.o. · Confidential · 2026</div>
<div class="headline">Investor<br><span>Gateway</span></div>
<div class="sub">AI-powered Enterprise Platform</div>
<div class="pills">
  <span class="pill pill-vi">Phase 1 Active</span>
  <span class="pill pill-or">Live Deploy</span>
  <span class="pill pill-gr">CEE → WorldWide</span>
</div>
<div class="domain">h-gr-fico.github.io/appiq</div>
</body>
</html>
