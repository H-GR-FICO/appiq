<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#04061A;
  display:flex;align-items:stretch;
  position:relative;overflow:hidden;
}
.left{
  width:60px;background:#E8750A;flex-shrink:0;
}
.content{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding:64px 72px;position:relative;z-index:2;
}
.bg-glow{
  position:absolute;
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,117,10,.18) 0%,transparent 65%);
  right:-100px;top:50%;transform:translateY(-50%);
  pointer-events:none;
}
.label{
  font-size:13px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
  color:rgba(232,117,10,.75);margin-bottom:28px;
}
.headline{
  font-size:96px;font-weight:900;line-height:.95;letter-spacing:-3px;
  color:#fff;margin-bottom:32px;
}
.headline span{color:#E8750A;}
.tagline{
  font-size:22px;color:rgba(255,255,255,.45);font-weight:300;
  letter-spacing:1px;margin-bottom:40px;
}
.badge{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(232,117,10,.12);border:1px solid rgba(232,117,10,.35);
  border-radius:8px;padding:10px 20px;
}
.badge-text{font-size:14px;font-weight:700;letter-spacing:1px;color:rgba(232,117,10,.9);}
.right-accent{
  width:60px;background:rgba(232,117,10,.08);flex-shrink:0;
  display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:28px;align-items:center;
}
.ver{font-size:10px;font-weight:700;color:rgba(255,255,255,.15);letter-spacing:2px;writing-mode:vertical-rl;transform:rotate(180deg);}
</style>
</head>
<body>
<div class="left"></div>
<div class="content">
  <div class="bg-glow"></div>
  <div class="label">HOPI AppIQ · David Gogela</div>
  <div class="headline">Business<br><span>Vision</span></div>
  <div class="tagline">Built for the universe. Starting with you.</div>
  <div class="badge">
    <span class="badge-text">🚀 HOPI TechIQ s.r.o. · 2026</span>
  </div>
</div>
<div class="right-accent">
  <div class="ver">CEO BRIEF</div>
</div>
</body>
</html>
